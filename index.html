<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The One Community - UCL Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDxbrWG3bQTqFiKNZ_8rLvMPeOOj3PTWJI",
            authDomain: "the-one-community-a3a50.firebaseapp.com",
            projectId: "the-one-community-a3a50",
            storageBucket: "the-one-community-a3a50.firebasestorage.app",
            messagingSenderId: "935304206770",
            appId: "1:935304206770:web:66386d8e818f4625b1acab",
            measurementId: "G-MN34Y0XN8J"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = 'the-one-community-v1';

        window.state = {
            isAdmin: false,
            user: null,
            teams: Array.from({length: 36}, (_, i) => ({ id: i, name: "" })), 
            rounds: Array.from({length: 8}, (_, i) => ({ round: i + 1, matches: [] })),
            knockout: { playoffs: [], r16: [], qf: [], sf: [], final: [] },
            currentRound: 1,
            activeTab: 'standing',
            isLeagueStarted: false,
            potr: {} 
        };

        const getTournamentDoc = () => doc(db, 'tournaments', appId);

        const saveToCloud = async () => {
            if (!window.state.user || !window.state.isAdmin) return;
            try {
                await setDoc(getTournamentDoc(), {
                    teams: window.state.teams,
                    rounds: window.state.rounds,
                    knockout: window.state.knockout,
                    isLeagueStarted: window.state.isLeagueStarted,
                    potr: window.state.potr,
                    currentRound: window.state.currentRound
                }, { merge: true });
            } catch (e) { console.error(e); }
        };

        const startSync = async () => {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    window.state.user = user;
                    onSnapshot(getTournamentDoc(), (docSnap) => {
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            Object.assign(window.state, data);
                            refreshUI();
                        }
                    }, (err) => console.error(err));
                }
            });
            await signInAnonymously(auth);
        };

        startSync();

        // Updated Score Color Logic: Win=Emerald, Lose=Red, Draw=Yellow
        window.getScoreColor = (s1, s2) => {
            if (s1 === null || s2 === null) return 'text-zinc-500';
            if (s1 > s2) return 'text-emerald-500'; // Winner (Green)
            if (s1 < s2) return 'text-red-500';     // Loser (Red)
            return 'text-yellow-500';              // Draw (Yellow)
        };

        window.refreshUI = () => {
            const container = document.getElementById('content');
            renderNav();
            renderHeader();
            if(window.state.activeTab === 'setup') renderSetup(container);
            else if(window.state.activeTab === 'rounds') renderRounds(container);
            else if(window.state.activeTab === 'standing') renderTable(container);
            else if(window.state.activeTab === 'potr') renderPOTR(container);
            else if(window.state.activeTab === 'knockout') renderKnockout(container);
            document.getElementById('loader').style.display = 'none';
        };

        window.renderNav = () => {
            const tabs = ['rounds', 'standing', 'knockout', 'potr', 'setup'];
            const labels = ['Fixtures', 'Table', 'Knockout', 'POTR', 'Admin'];
            document.getElementById('nav-bar').innerHTML = tabs.map((t, i) => {
                if (t === 'setup' && !window.state.isAdmin) return '';
                return `<button onclick="changeTab('${t}')" class="flex flex-col items-center gap-1 flex-1 transition-all ${window.state.activeTab === t ? 'text-red-500 scale-110' : 'text-zinc-500'}">
                    <span class="text-[8px] font-bold uppercase tracking-tighter">${labels[i]}</span>
                </button>`;
            }).join('');
        };

        const renderTable = (container) => {
            if(!window.state.isLeagueStarted) { container.innerHTML = `<div class="p-20 text-center opacity-30 italic">League Phase စတင်ရန် စောင့်ဆိုင်းနေပါသည်...</div>`; return; }
            
            let statsMap = {};
            window.state.teams.forEach(t => statsMap[t.id] = { id: t.id, name: t.name || `Manager ${t.id+1}`, p: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, gd: 0, pts: 0 });
            
            window.state.rounds.forEach(r => {
                r.matches.forEach(m => {
                    if(m.hs !== null && m.as !== null) {
                        const h = statsMap[m.h], a = statsMap[m.a];
                        if(!h || !a) return;
                        h.p++; a.p++; h.gf += m.hs; h.ga += m.as; a.gf += m.as; a.ga += m.hs;
                        if(m.hs > m.as) { h.w++; h.pts += 3; a.l++; }
                        else if(m.as > m.hs) { a.w++; a.pts += 3; h.l++; }
                        else { h.d++; a.d++; h.pts += 1; a.pts += 1; }
                        h.gd = h.gf - h.ga; a.gd = a.gf - a.ga;
                    }
                });
            });

            const stats = Object.values(statsMap).filter(s => window.state.teams[s.id].name !== "").sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);

            container.innerHTML = `
                <div class="bg-zinc-900/40 rounded-3xl border border-white/5 overflow-hidden overflow-x-auto no-scrollbar">
                    <table class="w-full text-left min-w-[500px]">
                        <thead>
                            <tr class="text-[8px] uppercase font-black text-zinc-500 border-b border-white/5 bg-white/[0.02]">
                                <th class="p-4 pl-6">Pos Manager</th>
                                <th class="p-4 text-center">P</th><th class="p-4 text-center">W</th><th class="p-4 text-center">D</th>
                                <th class="p-4 text-center">L</th><th class="p-4 text-center">GF</th><th class="p-4 text-center">GA</th><th class="p-4 text-center">GD</th><th class="p-4 text-center text-red-500">Pts</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${stats.map((s,i) => `
                                <tr class="border-b border-white/[0.02] ${i < 8 ? 'bg-emerald-500/5' : (i < 24 ? 'bg-red-500/5' : '')}">
                                    <td class="p-4 pl-6 flex items-center gap-3">
                                        <span class="text-[9px] font-black ${i < 8 ? 'text-emerald-500' : (i < 24 ? 'text-red-500' : 'opacity-20')}">${i+1}</span>
                                        <span class="text-xs font-bold text-zinc-200 truncate max-w-[100px]">${s.name}</span>
                                    </td>
                                    <td class="p-4 text-center text-zinc-400 text-[10px]">${s.p}</td>
                                    <td class="p-4 text-center text-zinc-400 text-[10px]">${s.w}</td>
                                    <td class="p-4 text-center text-zinc-400 text-[10px]">${s.d}</td>
                                    <td class="p-4 text-center text-zinc-400 text-[10px]">${s.l}</td>
                                    <td class="p-4 text-center text-zinc-500 text-[10px]">${s.gf}</td>
                                    <td class="p-4 text-center text-zinc-500 text-[10px]">${s.ga}</td>
                                    <td class="p-4 text-center font-bold text-[10px] ${s.gd>0?'text-emerald-500':s.gd<0?'text-red-400':'text-zinc-500'}">${s.gd}</td>
                                    <td class="p-4 text-center font-black text-red-500 text-sm">${s.pts}</td>
                                </tr>`).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        };

        const renderPOTR = (container) => {
            const rd = window.state.potr[window.state.currentRound] || { name: 'TBA', gf: 0, ga: 0, img: '' };
            const gd = rd.gf - rd.ga;
            
            container.innerHTML = `
                <div class="bg-zinc-900/80 p-6 rounded-[2.5rem] border border-white/5 text-center">
                    <p class="text-[9px] font-black text-zinc-500 uppercase tracking-widest mb-6">Matchday ${window.state.currentRound} MVP</p>
                    
                    <div class="relative w-32 h-32 mx-auto mb-6">
                        <div class="w-full h-full rounded-full bg-red-600/10 border-2 border-red-500/20 overflow-hidden flex items-center justify-center">
                            ${rd.img ? `<img src="${rd.img}" class="w-full h-full object-cover">` : `<span class="text-4xl">🏆</span>`}
                        </div>
                        ${window.state.isAdmin ? `
                            <label class="absolute bottom-0 right-0 w-10 h-10 bg-red-600 rounded-full border-4 border-black flex items-center justify-center cursor-pointer hover:scale-110 transition-all">
                                📷 <input type="file" class="hidden" accept="image/*" onchange="handleImageUpload(event)">
                            </label>` : ''}
                    </div>

                    <input type="text" placeholder="Manager Name" value="${rd.name}" onchange="updatePOTR('name', this.value)" ${!window.state.isAdmin?'readonly':''} 
                        class="bg-transparent text-2xl font-black text-white text-center w-full outline-none mb-6">
                    
                    <div class="flex justify-center gap-4">
                        <div class="bg-black/40 px-4 py-3 rounded-2xl border border-white/5 flex flex-col items-center">
                            <span class="text-[7px] font-black text-zinc-500">GF</span>
                            <input type="number" value="${rd.gf}" onchange="updatePOTR('gf', this.value)" ${!window.state.isAdmin?'readonly':''} class="bg-transparent w-8 text-center font-black text-lg text-emerald-500 outline-none">
                        </div>
                        <div class="bg-black/40 px-4 py-3 rounded-2xl border border-white/5 flex flex-col items-center">
                            <span class="text-[7px] font-black text-zinc-500">GA</span>
                            <input type="number" value="${rd.ga}" onchange="updatePOTR('ga', this.value)" ${!window.state.isAdmin?'readonly':''} class="bg-transparent w-8 text-center font-black text-lg text-red-500 outline-none">
                        </div>
                        <div class="bg-black/40 px-4 py-3 rounded-2xl border border-white/5 flex flex-col items-center">
                            <span class="text-[7px] font-black text-zinc-500">GD</span>
                            <span class="text-lg font-black ${gd>0?'text-emerald-500':gd<0?'text-red-500':'text-zinc-500'}">${gd > 0 ? '+'+gd : gd}</span>
                        </div>
                    </div>
                </div>
            `;
        };

        const renderRounds = (container) => {
            if(!window.state.isLeagueStarted) { container.innerHTML = `<div class="py-20 text-center opacity-40 italic">စတင်ခြင်း မရှိသေးပါ</div>`; return; }
            const rIdx = window.state.currentRound - 1;
            const r = window.state.rounds[rIdx] || { matches: [] };
            
            container.innerHTML = `
                <div class="flex items-center justify-between mb-6 bg-zinc-900/50 p-2 rounded-2xl border border-white/5">
                    <button onclick="moveRound(-1)" class="w-10 h-10 flex items-center justify-center rounded-xl bg-white/5">←</button>
                    <div class="text-center"><span class="text-sm font-black uppercase tracking-widest text-red-500">Matchday ${window.state.currentRound}</span></div>
                    <button onclick="moveRound(1)" class="w-10 h-10 flex items-center justify-center rounded-xl bg-white/5">→</button>
                </div>
                <div class="space-y-2">
                    ${r.matches.length === 0 ? `<div class="py-10 text-center opacity-30 text-[10px]">ပွဲစဉ်များ မရှိသေးပါ</div>` : ''}
                    ${r.matches.map((m, i) => {
                        const hT = window.state.teams.find(t => t.id === m.h) || { name: 'TBA' };
                        const aT = window.state.teams.find(t => t.id === m.a) || { name: 'TBA' };
                        const hColor = getScoreColor(m.hs, m.as);
                        const aColor = getScoreColor(m.as, m.hs);
                        
                        return `
                        <div class="bg-zinc-900/40 p-3 rounded-2xl border border-white/5 flex items-center gap-3">
                            <div class="flex-1 text-right font-bold text-[11px] truncate ${m.hs > m.as ? 'text-white' : 'text-zinc-400'}">${hT.name}</div>
                            <div class="flex gap-1.5 items-center">
                                <input type="number" value="${m.hs ?? ''}" onchange="updateScore(${rIdx}, ${i}, 'hs', this.value)" ${!window.state.isAdmin?'readonly':''} 
                                    class="w-8 h-8 bg-black rounded-lg text-center font-black border border-white/10 ${hColor} outline-none transition-colors">
                                <span class="opacity-10 text-[6px] font-black">VS</span>
                                <input type="number" value="${m.as ?? ''}" onchange="updateScore(${rIdx}, ${i}, 'as', this.value)" ${!window.state.isAdmin?'readonly':''} 
                                    class="w-8 h-8 bg-black rounded-lg text-center font-black border border-white/10 ${aColor} outline-none transition-colors">
                            </div>
                            <div class="flex-1 text-left font-bold text-[11px] truncate ${m.as > m.hs ? 'text-white' : 'text-zinc-400'}">${aT.name}</div>
                            ${window.state.isAdmin ? `<button onclick="deleteMatch(${rIdx}, ${i})" class="text-[10px] text-red-500/30 hover:text-red-500 ml-2">×</button>` : ''}
                        </div>`;
                    }).join('')}
                    ${window.state.isAdmin ? `<button onclick="addLeagueMatch(${rIdx})" class="w-full py-4 border border-dashed border-white/10 rounded-2xl text-[8px] font-black opacity-30 mt-4 uppercase">+ Add Match Manually</button>` : ''}
                </div>
            `;
        };

        const renderKnockout = (container) => {
            const stages = [{ id: 'playoffs', label: 'Play-offs' }, { id: 'r16', label: 'Round of 16' }, { id: 'qf', label: 'Quarter' }, { id: 'sf', label: 'Semi' }, { id: 'final', label: 'Final' }];
            container.innerHTML = `<div class="space-y-8">${stages.map(s => `
                <div class="space-y-3">
                    <h3 class="text-[9px] font-black uppercase text-red-500 tracking-[0.2em] pl-3 border-l-2 border-red-500">${s.label}</h3>
                    <div class="grid gap-2">${renderKOList(s.id)}</div>
                    ${window.state.isAdmin ? `<button onclick="addKOMatch('${s.id}')" class="w-full py-2 bg-white/5 border border-dashed border-white/10 rounded-xl text-[8px] font-bold opacity-30">+ Match</button>` : ''}
                </div>`).join('')}</div>`;
        };

        const renderKOList = (stageId) => {
            const matches = window.state.knockout[stageId] || [];
            if (matches.length === 0) return `<p class="text-[8px] opacity-20 px-4">TBA</p>`;
            return matches.map((m, idx) => {
                const s1Color = getScoreColor(m.s1, m.s2);
                const s2Color = getScoreColor(m.s2, m.s1);

                return `
                <div class="bg-zinc-900/60 p-3 rounded-2xl border border-white/5 flex items-center justify-between gap-3">
                    <div class="flex-1 space-y-1">
                        <input type="text" value="${m.t1 || ''}" onchange="updateKOMatch('${stageId}', ${idx}, 't1', this.value)" ${!window.state.isAdmin?'readonly':''} class="w-full bg-transparent text-[11px] font-bold outline-none ${m.s1 > m.s2 ? 'text-white' : 'text-zinc-400'}">
                        <input type="text" value="${m.t2 || ''}" onchange="updateKOMatch('${stageId}', ${idx}, 't2', this.value)" ${!window.state.isAdmin?'readonly':''} class="w-full bg-transparent text-[11px] font-bold outline-none ${m.s2 > m.s1 ? 'text-white' : 'text-zinc-400'}">
                    </div>
                    <div class="flex flex-col gap-1">
                        <input type="number" value="${m.s1 ?? ''}" onchange="updateKOMatch('${stageId}', ${idx}, 's1', this.value)" ${!window.state.isAdmin?'readonly':''} 
                            class="w-7 h-6 bg-black rounded text-center text-[10px] font-black border border-white/5 ${s1Color} outline-none">
                        <input type="number" value="${m.s2 ?? ''}" onchange="updateKOMatch('${stageId}', ${idx}, 's2', this.value)" ${!window.state.isAdmin?'readonly':''} 
                            class="w-7 h-6 bg-black rounded text-center text-[10px] font-black border border-white/5 ${s2Color} outline-none">
                    </div>
                    ${window.state.isAdmin ? `<button onclick="deleteKOMatch('${stageId}', ${idx})" class="text-red-500/30 ml-2">×</button>` : ''}
                </div>`;
            }).join('');
        };

        const renderSetup = (container) => {
            container.innerHTML = `
                <div class="space-y-6">
                    <div class="bg-zinc-900/40 p-5 rounded-3xl border border-white/5">
                        <h3 class="text-[10px] font-black uppercase text-red-500 mb-6">Registration</h3>
                        <div class="grid gap-2 max-h-[50vh] overflow-y-auto pr-2 custom-scroll">
                            ${window.state.teams.map(t => `<div class="flex items-center gap-3 bg-black/40 p-2 rounded-xl border border-white/5">
                                <span class="text-[9px] w-6 opacity-30 font-black">${t.id+1}</span>
                                <input type="text" value="${t.name || ''}" onblur="updateTeamName(${t.id}, this.value)" class="flex-1 bg-transparent text-sm font-bold outline-none">
                            </div>`).join('')}
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="startLeague()" class="py-5 bg-red-600 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-xl shadow-red-600/20">Start Season</button>
                        <button onclick="generateFixtures()" class="py-5 bg-emerald-600 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-xl shadow-emerald-600/20">Generate Fixtures</button>
                    </div>
                    <button onclick="resetTournament()" class="w-full py-3 bg-red-600/20 text-red-500 rounded-2xl font-black text-[9px] uppercase tracking-widest">Reset All Data</button>
                </div>`;
        };

        window.generateFixtures = () => {
            const activeTeams = window.state.teams.filter(t => t.name.trim() !== "");
            if (activeTeams.length < 2) {
                alert("Manager အနည်းဆုံး ၂ ဦး လိုအပ်ပါသည်");
                return;
            }
            if (!confirm("Round 1 မှ 8 အထိ ပွဲစဉ်များကို Auto Generate လုပ်မလား? (ရှိပြီးသား ပွဲစဉ်များ ပျက်သွားပါလိမ့်မည်)")) return;

            window.state.rounds = Array.from({length: 8}, (_, i) => ({ round: i + 1, matches: [] }));
            
            const teamIds = activeTeams.map(t => t.id);
            if (teamIds.length % 2 !== 0) teamIds.push(null);

            const numRounds = 8;
            for (let r = 0; r < numRounds; r++) {
                let matches = [];
                let shuffled = [...teamIds].sort(() => Math.random() - 0.5);
                for (let i = 0; i < shuffled.length; i += 2) {
                    const h = shuffled[i];
                    const a = shuffled[i+1];
                    if (h !== null && a !== null) {
                        matches.push({ h, a, hs: null, as: null });
                    }
                }
                window.state.rounds[r].matches = matches;
            }

            window.state.isLeagueStarted = true;
            saveToCloud();
            refreshUI();
            alert("Matchday 1 to 8 Fixtures Generated!");
        };

        window.handleImageUpload = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const cur = window.state.currentRound;
                if(!window.state.potr[cur]) window.state.potr[cur] = { name: '', gf: 0, ga: 0, img: '' };
                window.state.potr[cur].img = event.target.result;
                saveToCloud();
                refreshUI();
            };
            reader.readAsDataURL(file);
        };

        window.updatePOTR = (field, val) => {
            const cur = window.state.currentRound;
            if(!window.state.potr[cur]) window.state.potr[cur] = { name: '', gf: 0, ga: 0, img: '' };
            window.state.potr[cur][field] = field === 'name' ? val : (val === "" ? 0 : parseInt(val));
            saveToCloud();
            refreshUI();
        };

        window.updateTeamName = (id, name) => { window.state.teams[id].name = name; saveToCloud(); };
        window.startLeague = () => { window.state.isLeagueStarted = true; saveToCloud(); refreshUI(); };
        window.resetTournament = () => { if(confirm("Data အားလုံးကို ဖျက်ပစ်မလား?")) { window.state.isLeagueStarted = false; window.state.rounds = Array.from({length: 8}, (_, i) => ({ round: i + 1, matches: [] })); window.state.knockout = { playoffs: [], r16: [], qf: [], sf: [], final: [] }; window.state.potr = {}; saveToCloud(); refreshUI(); } };
        window.addLeagueMatch = (rIdx) => { window.state.rounds[rIdx].matches.push({ h: 0, a: 1, hs: null, as: null }); saveToCloud(); refreshUI(); };
        window.deleteMatch = (rIdx, mIdx) => { if(confirm("ဤပွဲစဉ်ကို ဖျက်မလား?")) { window.state.rounds[rIdx].matches.splice(mIdx, 1); saveToCloud(); refreshUI(); } };
        window.updateScore = (rIdx, mIdx, side, val) => { window.state.rounds[rIdx].matches[mIdx][side] = val === "" ? null : parseInt(val); saveToCloud(); refreshUI(); };
        window.addKOMatch = (stage) => { window.state.knockout[stage].push({ t1: '', t2: '', s1: null, s2: null }); saveToCloud(); refreshUI(); };
        window.deleteKOMatch = (stage, idx) => { if(confirm("ဖျက်မလား?")) { window.state.knockout[stage].splice(idx, 1); saveToCloud(); refreshUI(); } };
        window.updateKOMatch = (stage, idx, field, val) => { window.state.knockout[stage][idx][field] = field.startsWith('s') ? (val === "" ? null : parseInt(val)) : val; saveToCloud(); refreshUI(); };
        window.changeTab = t => { window.state.activeTab = t; refreshUI(); };
        window.moveRound = d => { const n = window.state.currentRound + d; if(n > 0 && n <= 8) { window.state.currentRound = n; refreshUI(); } };
        window.adminLogin = () => { if(prompt("Password?") === "1234") { window.state.isAdmin = true; refreshUI(); } };
        window.logoutAdmin = () => { window.state.isAdmin = false; refreshUI(); };
        window.renderHeader = () => { document.getElementById('admin-status').innerHTML = window.state.isAdmin ? `<button onclick="logoutAdmin()" class="px-3 py-1 bg-red-600/10 text-red-500 text-[8px] font-black rounded-full border border-red-500/20">ADMIN</button>` : `<button onclick="adminLogin()" class="px-3 py-1 bg-white/5 text-zinc-500 text-[8px] font-black rounded-full">LOG IN</button>`; };

        window.onload = refreshUI;
    </script>
    <style>
        body { background: #000; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .glass-nav { background: rgba(30, 10, 10, 0.9); backdrop-filter: blur(20px); border-top: 1px solid rgba(255, 255, 255, 0.05); }
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
    </style>
</head>
