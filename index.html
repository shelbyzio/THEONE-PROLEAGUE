<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE ONE PRO LEAGUE - CLASSIC MOBILE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');

        :root {
            --neon-red: #ff003c;
            --neon-glow: rgba(255, 0, 60, 0.6);
            --dark-bg: #050505;
            --card-bg: rgba(18, 18, 18, 0.95);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--dark-bg); 
            color: #ffffff;
            -webkit-tap-highlight-color: transparent;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .neon-text { text-shadow: 0 0 10px var(--neon-glow), 0 0 20px var(--neon-glow); }
        .red-gradient { background: linear-gradient(135deg, #ff003c 0%, #9e0025 100%); }

        .standing-table { font-size: 10px; width: 100%; border-collapse: separate; border-spacing: 0 4px; table-layout: fixed; }
        .standing-table th { color: #666; font-size: 8px; text-transform: uppercase; padding: 8px 2px; text-align: center; }
        .standing-table td { background: rgba(255,255,255,0.02); padding: 10px 2px; text-align: center; vertical-align: middle; }

        .col-player { width: 35%; text-align: left !important; padding-left: 8px !important; }
        .col-stat { width: 8%; }
        .col-pts { width: 12%; }

        .standing-table tr td:first-child { border-radius: 8px 0 0 8px; }
        .standing-table tr td:last-child { border-radius: 0 8px 8px 0; }

        .score-box {
            background: #000;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-weight: 900;
            font-size: 13px;
            border: 1px solid #222;
            transition: all 0.3s ease;
        }

        .score-win { color: #22c55e !important; border-color: rgba(34, 197, 94, 0.4) !important; text-shadow: 0 0 8px rgba(34, 197, 94, 0.3); }
        .score-loss { color: #ef4444 !important; border-color: rgba(239, 68, 68, 0.4) !important; }
        .score-draw { color: #eab308 !important; border-color: rgba(234, 179, 8, 0.4) !important; }

        .glass-header {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .active-round-btn {
            background: var(--neon-red) !important;
            color: white !important;
            box-shadow: 0 0 10px var(--neon-glow);
        }

        .loading-overlay { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; align-items: center; justify-content: center; }

        .group-divider-text {
            color: var(--neon-red);
            text-shadow: 0 0 8px var(--neon-glow);
            letter-spacing: 0.2em;
        }
    </style>
</head>
<body class="no-scrollbar pb-10">

<div id="loading-screen" class="loading-overlay">
    <div class="flex flex-col items-center">
        <div class="w-10 h-10 border-2 border-zinc-900 border-t-red-600 rounded-full animate-spin"></div>
    </div>
</div>

<div id="admin-login-modal" class="fixed inset-0 z-[1000] flex items-center justify-center hidden bg-black/95 p-6">
    <div class="bg-zinc-900 w-full max-w-xs rounded-[2rem] p-8 border border-white/5 shadow-2xl">
        <h2 class="text-center font-black uppercase text-xs tracking-widest mb-6">Admin Verification</h2>
        <input type="password" id="adminPasswordInput" class="w-full bg-black border border-zinc-800 rounded-xl p-4 text-center tracking-[1em] mb-4 outline-none focus:border-red-600" placeholder="••••">
        <button onclick="attemptLogin()" class="w-full red-gradient rounded-xl p-4 font-black uppercase text-[10px]">Access Panel</button>
        <button onclick="closeAdminLogin()" class="w-full mt-2 p-2 text-zinc-600 text-[9px] font-bold uppercase">Back</button>
    </div>
</div>

<header class="glass-header sticky top-0 z-50 px-5 py-4">
    <div class="flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <div class="w-8 h-8 red-gradient rounded-lg flex items-center justify-center shadow-lg">
                <i class="fas fa-trophy text-white text-[10px]"></i>
            </div>
            <div>
                <h1 class="text-sm font-black italic uppercase leading-none tracking-tight">THE ONE <span class="text-red-600">PRO LEAGUE</span></h1>
                <p class="text-[7px] text-zinc-500 font-bold tracking-[0.2em] uppercase">Official Website</p>
            </div>
        </div>
        <div class="flex bg-zinc-900 p-1 rounded-xl border border-zinc-800">
            <button onclick="showTab('user-view')" id="btn-user" class="px-4 py-2 rounded-lg text-[9px] font-black uppercase bg-red-600 text-white">View</button>
            <button onclick="openAdminLogin()" id="btn-admin" class="px-4 py-2 rounded-lg text-[9px] font-black uppercase text-zinc-500">Admin</button>
        </div>
    </div>
</header>

<main class="p-4">
    <section id="admin-panel" class="tab-content space-y-6">
        <div class="bg-zinc-900/50 rounded-3xl p-6 border border-white/5">
            <h3 class="text-[10px] font-black uppercase text-red-600 mb-4 tracking-widest">Tournament Setup</h3>
            <textarea id="teamInput" rows="4" class="w-full bg-black border border-zinc-800 rounded-2xl p-4 text-xs text-white mb-4 outline-none focus:border-red-600" placeholder="Paste 48 players names..."></textarea>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="generateTournamentData()" class="red-gradient p-4 rounded-xl text-[9px] font-black uppercase">Create Groups</button>
                <button onclick="advanceToKnockout()" class="bg-zinc-800 p-4 rounded-xl text-[9px] font-black uppercase">Start Knockout</button>
            </div>
        </div>
        <div id="admin-match-list" class="space-y-2"></div>
    </section>

    <section id="user-view" class="tab-content active">
        <div class="flex bg-zinc-900 p-1 rounded-2xl border border-zinc-800 mb-6">
            <button onclick="toggleUserSubTab('group')" id="sub-btn-group" class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase bg-red-600">Group Stage</button>
            <button onclick="toggleUserSubTab('knockout')" id="sub-btn-knock" class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase text-zinc-500">Knockout</button>
        </div>

        <div id="group-stage-content">
            <div class="flex space-x-2 overflow-x-auto no-scrollbar mb-6 pb-2">
                <button onclick="filterRound(1)" id="rd-1" class="flex-1 min-w-[100px] py-3 rounded-xl text-[10px] font-black uppercase bg-zinc-900 border border-white/5 active-round-btn">Round 1</button>
                <button onclick="filterRound(2)" id="rd-2" class="flex-1 min-w-[100px] py-3 rounded-xl text-[10px] font-black uppercase bg-zinc-900 border border-white/5 text-zinc-500">Round 2</button>
                <button onclick="filterRound(3)" id="rd-3" class="flex-1 min-w-[100px] py-3 rounded-xl text-[10px] font-black uppercase bg-zinc-900 border border-white/5 text-zinc-500">Round 3</button>
            </div>

            <div class="mb-10">
                <h3 class="text-[10px] font-black uppercase text-zinc-600 tracking-[0.3em] mb-4 pl-2">Current Fixtures</h3>
                <div id="user-fixture-list" class="space-y-4"></div>
            </div>

            <div>
                <h3 class="text-[10px] font-black uppercase text-zinc-600 tracking-[0.3em] mb-4 pl-2">Group Standings</h3>
                <div id="group-tables-container" class="space-y-6"></div>
            </div>
        </div>

        <div id="knockout-content" class="hidden">
            <div id="knockout-bracket" class="space-y-12"></div>
        </div>
    </section>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBO_TmNXPkY2-vvDtcP8j7YX6HU-8lRpV4",
        authDomain: "theoneproleague.firebaseapp.com",
        projectId: "theoneproleague",
        appId: "1:983758717301:web:cac06eddc7160a2049133c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const appId = "the-one-neon-v1"; 

    let state = { teams: [], matches: [], koMatches: [], isKnockoutStarted: false, currentRound: 1, isAdminAuthenticated: false };

    onAuthStateChanged(auth, async (u) => {
        if (!u) await signInAnonymously(auth);
        else {
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'mainData'), (snap) => {
                if (snap.exists()) { Object.assign(state, snap.data()); renderAll(); }
                document.getElementById('loading-screen').style.display = 'none';
            });
        }
    });

    window.openAdminLogin = () => { if(state.isAdminAuthenticated) { showTab('admin-panel'); return; } document.getElementById('admin-login-modal').classList.remove('hidden'); };
    window.closeAdminLogin = () => document.getElementById('admin-login-modal').classList.add('hidden');
    window.attemptLogin = () => {
        if(document.getElementById('adminPasswordInput').value === "1234") {
            state.isAdminAuthenticated = true; closeAdminLogin(); showTab('admin-panel');
        }
    };

    window.showTab = (id) => {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        const isA = id === 'admin-panel';
        document.getElementById('btn-admin').className = isA ? "px-4 py-2 rounded-lg text-[9px] font-black uppercase bg-red-600 text-white" : "px-4 py-2 rounded-lg text-[9px] font-black uppercase text-zinc-500";
        document.getElementById('btn-user').className = !isA ? "px-4 py-2 rounded-lg text-[9px] font-black uppercase bg-red-600 text-white" : "px-4 py-2 rounded-lg text-[9px] font-black uppercase text-zinc-500";
    };

    window.generateTournamentData = async () => {
        const raw = document.getElementById('teamInput').value.split('\n').filter(n => n.trim() !== "");
        if (raw.length !== 48) return alert("Please enter exactly 48 names.");
        const gNames = "ABCDEFGHIJKL".split("");
        const teams = raw.sort(() => Math.random() - 0.5).map((n, i) => ({ id: i + 1, name: n.trim(), p: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, gd: 0, pts: 0, group: gNames[Math.floor(i / 4)] }));
        const matches = []; let mId = 1;
        gNames.forEach(g => {
            const gt = teams.filter(t => t.group === g);
            [[0,1],[2,3],[0,2],[1,3],[0,3],[1,2]].forEach((p, idx) => matches.push({id: mId++, round: Math.floor(idx/2)+1, group: g, home: gt[p[0]].id, away: gt[p[1]].id, hS: null, aS: null}));
        });
        await setDoc(doc(db, 'artifacts', appId, 'public', 'mainData'), { teams, matches, koMatches: [], isKnockoutStarted: false });
    };

    window.updateScore = async (id, val, side, isKo) => {
        const s = val === "" ? null : parseInt(val);
        let targetM = isKo ? [...state.koMatches] : [...state.matches];
        const m = targetM.find(x => x.id === id);
        if(!m) return;
        if(side === 'home') m.hS = s; else m.aS = s;

        let t = state.teams.map(x => ({...x, p:0, w:0, d:0, l:0, gf:0, ga:0, gd:0, pts:0}));
        state.matches.forEach(match => {
            if(match.hS !== null && match.aS !== null) {
                const h = t.find(x => x.id === match.home), a = t.find(x => x.id === match.away);
                if(h && a) {
                    h.p++; a.p++; h.gf += match.hS; h.ga += match.aS; a.gf += match.aS; a.ga += match.hS;
                    if(match.hS > match.aS) { h.w++; h.pts+=3; a.l++; } else if(match.hS < match.aS) { a.w++; a.pts+=3; h.l++; } else { h.d++; a.d++; h.pts+=1; a.pts+=1; }
                    h.gd = h.gf - h.ga; a.gd = a.gf - a.ga;
                }
            }
        });
        if(isKo) targetM.forEach(m => { if(m.hS !== null && m.aS !== null && m.nextMatch) { const winner = m.hS >= m.aS ? m.home : m.away; const nm = targetM.find(x => x.id === m.nextMatch); if(nm) { if(m.nextPos === 'home') nm.home = winner; else nm.away = winner; } } });
        await updateDoc(doc(db, 'artifacts', appId, 'public', 'mainData'), { teams: t, matches: state.matches, koMatches: targetM });
    };

    window.advanceToKnockout = async () => {
        const gNames = "ABCDEFGHIJKL".split(""); 
        const winners = []; // Group 1st places
        const runnersUp = []; // Group 2nd places
        const allThirds = []; // To find best 3rds

        gNames.forEach(g => { 
            const gt = state.teams.filter(t => t.group === g).sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.ga);
            winners.push(gt[0]);
            runnersUp.push(gt[1]);
            allThirds.push(gt[2]);
        });

        const bestThirds = allThirds.sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.ga).slice(0, 8);
        
        // Combine 2nd places and 3rd places to face 1st places
        const poolB = [...runnersUp, ...bestThirds]; 
        
        // Shuffle poolB but ensure Group 1st doesn't meet same group's 2nd
        // A simple way is to shift the winners list
        const ko = [];
        const totalMatches = 16; // R32 has 16 matches

        for(let i=0; i < totalMatches; i++) {
            // Pick Winner from i
            const home = winners[i % winners.length];
            // Pick Opponent from poolB with an offset to avoid same group (e.g., offset of 4)
            const awayIndex = (i + 4) % poolB.length;
            const away = poolB[awayIndex];

            ko.push({ 
                id: 100+i, 
                stage: 'R32', 
                home: home?.id || null, 
                away: away?.id || null, 
                hS: null, 
                aS: null, 
                nextMatch: 200 + Math.floor(i/2), 
                nextPos: i%2===0?'home':'away'
            });
        }

        // Fill other stages
        for(let i=0; i<8; i++) ko.push({ id: 200+i, stage: 'R16', home: null, away: null, hS: null, aS: null, nextMatch: 300 + Math.floor(i/2), nextPos: i%2===0?'home':'away'});
        for(let i=0; i<4; i++) ko.push({ id: 300+i, stage: 'QF', home: null, away: null, hS: null, aS: null, nextMatch: 400 + Math.floor(i/2), nextPos: i%2===0?'home':'away'});
        for(let i=0; i<2; i++) ko.push({ id: 400+i, stage: 'SF', home: null, away: null, hS: null, aS: null, nextMatch: 500, nextPos: i%2===0?'home':'away'});
        ko.push({ id: 500, stage: 'Final', home: null, away: null, hS: null, aS: null });

        await updateDoc(doc(db, 'artifacts', appId, 'public', 'mainData'), { koMatches: ko, isKnockoutStarted: true });
        toggleUserSubTab('knockout');
    };

    window.filterRound = (r) => { state.currentRound = r; renderAll(); };

    function renderAll() {
        const getResultClass = (s1, s2) => {
            if (s1 === null || s2 === null) return 'text-zinc-500';
            if (s1 > s2) return 'score-win';
            if (s1 < s2) return 'score-loss';
            return 'score-draw';
        };

        const adminList = document.getElementById('admin-match-list');
        if(adminList) {
            const data = state.isKnockoutStarted ? state.koMatches : state.matches;
            adminList.innerHTML = data.map(m => `
                <div class="bg-zinc-950 p-4 rounded-2xl flex items-center justify-between border border-white/5">
                    <span class="text-[8px] font-black text-zinc-600 w-8">${m.stage || "Grp " + m.group}</span>
                    <div class="flex-1 flex items-center justify-center space-x-2">
                        <span class="text-[10px] truncate w-20 text-right">${state.teams.find(t=>t.id===m.home)?.name || 'TBD'}</span>
                        <input type="number" value="${m.hS ?? ''}" onchange="updateScore(${m.id}, this.value, 'home', ${!!m.stage})" class="w-8 h-8 bg-black rounded text-center text-xs">
                        <input type="number" value="${m.aS ?? ''}" onchange="updateScore(${m.id}, this.value, 'away', ${!!m.stage})" class="w-8 h-8 bg-black rounded text-center text-xs">
                        <span class="text-[10px] truncate w-20 text-left">${state.teams.find(t=>t.id===m.away)?.name || 'TBD'}</span>
                    </div>
                </div>`).join('');
        }

        for(let i=1; i<=3; i++) {
            const btn = document.getElementById(`rd-${i}`);
            if (btn) btn.className = `flex-1 min-w-[100px] py-3 rounded-xl text-[10px] font-black uppercase bg-zinc-900 border border-white/5 ${state.currentRound === i ? 'active-round-btn' : 'text-zinc-500'}`;
        }

        const fixtureList = document.getElementById('user-fixture-list');
        const roundMatches = state.matches.filter(m => m.round === state.currentRound);
        let fixtureHtml = "";
        let currentGroupHeader = "";

        roundMatches.sort((a,b) => a.group.localeCompare(b.group)).forEach(m => {
            if(m.group !== currentGroupHeader) {
                currentGroupHeader = m.group;
                fixtureHtml += `
                    <div class="flex items-center space-x-4 py-4">
                        <div class="h-[1px] flex-1 bg-gradient-to-r from-transparent via-red-900 to-transparent"></div>
                        <span class="group-divider-text text-[10px] font-black uppercase italic">Group ${m.group}</span>
                        <div class="h-[1px] flex-1 bg-gradient-to-r from-transparent via-red-900 to-transparent"></div>
                    </div>`;
            }

            fixtureHtml += `
                <div class="bg-zinc-900/80 p-4 rounded-2xl border border-white/5 flex items-center">
                    <div class="flex-1 flex items-center justify-between">
                        <div class="flex-1 text-right text-[11px] font-bold truncate pr-3 text-zinc-300">${state.teams.find(t=>t.id===m.home)?.name}</div>
                        <div class="flex items-center space-x-1">
                            <div class="score-box ${getResultClass(m.hS, m.aS)}">${m.hS ?? ''}</div>
                            <div class="score-box ${getResultClass(m.aS, m.hS)}">${m.aS ?? ''}</div>
                        </div>
                        <div class="flex-1 text-left text-[11px] font-bold truncate pl-3 text-zinc-300">${state.teams.find(t=>t.id===m.away)?.name}</div>
                    </div>
                </div>`;
        });
        fixtureList.innerHTML = fixtureHtml;

        const tableCont = document.getElementById('group-tables-container');
        tableCont.innerHTML = "ABCDEFGHIJKL".split("").map(g => {
            const gt = state.teams.filter(t => t.group === g).sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.ga);
            return `
                <div class="bg-zinc-900/40 p-3 rounded-3xl border border-white/5">
                    <div class="text-[10px] font-black text-red-600 uppercase mb-3 px-2 tracking-widest flex items-center justify-between">
                        <span>Group ${g}</span>
                        <span class="text-[7px] text-zinc-600 font-normal">Full Stats</span>
                    </div>
                    <table class="standing-table">
                        <thead>
                            <tr>
                                <th class="col-player">PLAYER</th>
                                <th class="col-stat">P</th>
                                <th class="col-stat text-green-600/50">W</th>
                                <th class="col-stat text-yellow-600/50">D</th>
                                <th class="col-stat text-red-600/50">L</th>
                                <th class="col-stat">GF</th>
                                <th class="col-stat">GA</th>
                                <th class="col-stat">GD</th>
                                <th class="col-pts">PTS</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${gt.map((t,i) => `
                            <tr class="${i<2?'text-white':'text-zinc-500'}">
                                <td class="col-player font-bold flex items-center overflow-hidden">
                                    <span class="w-3 shrink-0 opacity-20 text-[7px] mr-1">${i+1}</span>
                                    <span class="truncate">${t.name}</span>
                                </td>
                                <td class="col-stat">${t.p}</td>
                                <td class="col-stat font-medium">${t.w}</td>
                                <td class="col-stat font-medium">${t.d}</td>
                                <td class="col-stat font-medium">${t.l}</td>
                                <td class="col-stat">${t.gf}</td>
                                <td class="col-stat">${t.ga}</td>
                                <td class="col-stat font-bold ${t.gd > 0 ? 'text-green-500' : t.gd < 0 ? 'text-red-500' : ''}">${t.gd > 0 ? '+'+t.gd : t.gd}</td>
                                <td class="col-pts font-black text-[12px] ${i<2?'text-red-600 neon-text':''}">${t.pts}</td>
                            </tr>`).join('')}
                        </tbody>
                    </table>
                </div>`;
        }).join('');

        const bracket = document.getElementById('knockout-bracket');
        if(state.isKnockoutStarted) {
            bracket.innerHTML = ['R32', 'R16', 'QF', 'SF', 'Final'].map(s => {
                const km = state.koMatches.filter(m => m.stage === s);
                return `<div class="space-y-4">
                        <div class="text-[9px] font-black uppercase text-center text-red-600 tracking-[0.5em] mb-6">${s} Stage</div>
                        <div class="grid grid-cols-1 gap-2">${km.map(m => `
                            <div class="bg-zinc-900/60 p-4 rounded-2xl border border-white/5 flex flex-col space-y-2">
                                <div class="flex justify-between items-center">
                                    <span class="text-[10px] font-bold ${m.hS > m.aS ? 'text-green-500' : m.hS < m.aS ? 'text-red-500' : 'text-zinc-400'}">${state.teams.find(t=>t.id===m.home)?.name || 'TBD'}</span>
                                    <span class="font-black text-xs ${getResultClass(m.hS, m.aS)}">${m.hS ?? '-'}</span>
                                </div>
                                <div class="flex justify-between items-center">
                                    <span class="text-[10px] font-bold ${m.aS > m.hS ? 'text-green-500' : m.aS < m.hS ? 'text-red-500' : 'text-zinc-400'}">${state.teams.find(t=>t.id===m.away)?.name || 'TBD'}</span>
                                    <span class="font-black text-xs ${getResultClass(m.aS, m.hS)}">${m.aS ?? '-'}</span>
                                </div>
                            </div>`).join('')}</div>
                    </div>`;
            }).join('');
        }
    }

    window.toggleUserSubTab = (t) => {
        const isG = t === 'group';
        document.getElementById('group-stage-content').classList.toggle('hidden', !isG);
        document.getElementById('knockout-content').classList.toggle('hidden', isG);
        document.getElementById('sub-btn-group').className = isG ? "flex-1 py-3 rounded-xl text-[10px] font-black uppercase bg-red-600" : "flex-1 py-3 rounded-xl text-[10px] font-black uppercase text-zinc-500";
        document.getElementById('sub-btn-knock').className = !isG ? "flex-1 py-3 rounded-xl text-[10px] font-black uppercase bg-red-600" : "flex-1 py-3 rounded-xl text-[10px] font-black uppercase text-zinc-500";
    };
</script>
</body>
</html>
