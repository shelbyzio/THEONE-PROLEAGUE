<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE ONE PRO LEAGUE - LIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Outfit:wght@700;900&display=swap');

        :root {
            --neon-red: #ff003c;
            --neon-glow: rgba(255, 0, 60, 0.5);
            --neon-blue: #00e5ff;
            --neon-blue-glow: rgba(0, 229, 255, 0.6);
            --dark-bg: #050505;
            --card-bg: #0f0f0f;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--dark-bg); 
            color: #ffffff;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        .heading-font { font-family: 'Outfit', sans-serif; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .neon-text { text-shadow: 0 0 10px var(--neon-glow); }
        .red-gradient { background: linear-gradient(135deg, #ff003c 0%, #bc002d 100%); }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }

        .standing-table { width: 100%; border-collapse: separate; border-spacing: 0 4px; }
        .standing-table th { color: #555; font-size: 9px; text-transform: uppercase; padding: 12px 4px; letter-spacing: 0.1em; }
        .standing-table td { background: rgba(255,255,255,0.02); padding: 12px 4px; text-align: center; }

        .col-player { text-align: left !important; padding-left: 12px !important; width: 40%; }
        .score-box {
            background: #000;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-weight: 900;
            font-size: 14px;
            border: 1px solid #222;
        }

        .score-win { color: #22c55e; border-color: rgba(34, 197, 94, 0.3); }
        .score-loss { color: #ef4444; border-color: rgba(239, 68, 68, 0.3); }
        .score-draw { color: #eab308; border-color: rgba(234, 179, 8, 0.3); }

        .loading-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .nav-btn.active { background: var(--neon-red); color: white; box-shadow: 0 4px 15px var(--neon-glow); }
        
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* Floating Bubble Styling (Without Text Label) */
        .result-bubble {
            position: fixed;
            bottom: 30px;
            right: 25px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #001a2e 0%, #004e7c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            cursor: pointer;
            border: 2px solid var(--neon-blue);
            user-select: none;
            touch-action: none;
            box-shadow: 0 0 15px var(--neon-blue-glow), inset 0 0 10px var(--neon-blue-glow);
            animation: neon-pulse 2s infinite alternate;
        }

        .result-bubble:active { transform: scale(0.9); }

        .neon-icon {
            color: #fff;
            filter: drop-shadow(0 0 5px var(--neon-blue));
            font-size: 24px;
            pointer-events: none;
        }

        @keyframes neon-pulse {
            0% { box-shadow: 0 0 10px var(--neon-blue-glow), inset 0 0 5px var(--neon-blue-glow); border-color: rgba(0, 229, 255, 0.6); }
            100% { box-shadow: 0 0 25px var(--neon-blue-glow), inset 0 0 15px var(--neon-blue-glow); border-color: rgba(0, 229, 255, 1); }
        }

        .admin-score-input {
            width: 45px;
            height: 45px;
            background: #111;
            border: 1px solid #333;
            border-radius: 12px;
            text-align: center;
            font-weight: 900;
            font-size: 16px;
            color: #fff;
            outline: none;
        }
    </style>
</head>
<body class="no-scrollbar pb-24">

<div id="loading-screen" class="loading-screen">
    <div class="w-12 h-12 border-4 border-zinc-800 border-t-red-600 rounded-full animate-spin mb-4"></div>
    <p class="text-[10px] font-black tracking-[0.3em] text-zinc-500 uppercase">Live Synchronizing</p>
</div>

<!-- Draggable Floating Neon Bubble (Telegram Link Only) -->
<div id="draggable-bubble" class="result-bubble">
    <i class="fab fa-telegram-plane neon-icon"></i>
</div>

<!-- Admin Login Modal -->
<div id="admin-modal" class="fixed inset-0 z-[60] bg-black/95 flex items-center justify-center p-6 hidden">
    <div class="w-full max-w-xs space-y-6">
        <div class="text-center">
            <h2 class="heading-font text-xl uppercase italic">Admin <span class="text-red-600">Access</span></h2>
            <p class="text-[9px] text-zinc-500 tracking-widest mt-1 uppercase">Enter Code to Edit</p>
        </div>
        <input type="password" id="adminPass" class="w-full bg-zinc-900 border border-white/10 rounded-2xl p-4 text-center tracking-[1em] outline-none focus:border-red-600 transition-all" placeholder="••••">
        <button onclick="handleLogin()" class="w-full red-gradient p-4 rounded-2xl font-black uppercase text-xs shadow-lg">Login</button>
        <button onclick="toggleModal('admin-modal', false)" class="w-full text-zinc-600 text-[10px] font-bold uppercase">Cancel</button>
    </div>
</div>

<header class="sticky top-0 z-40 bg-black/80 backdrop-blur-lg border-b border-white/5 px-6 py-5">
    <div class="flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 red-gradient rounded-xl flex items-center justify-center shadow-2xl">
                <i class="fas fa-bolt text-white text-lg"></i>
            </div>
            <div>
                <h1 class="heading-font text-lg leading-none tracking-tight italic">THE ONE <span class="text-red-600">PRO</span></h1>
                <p class="text-[8px] text-zinc-500 font-black tracking-[0.2em] uppercase mt-1">Real-time League Table</p>
            </div>
        </div>
        <div class="flex bg-zinc-900 p-1 rounded-xl">
            <button onclick="switchTab('user-view')" id="nav-user" class="nav-btn active px-5 py-2.5 rounded-lg text-[10px] font-black uppercase transition-all">Public</button>
            <button onclick="checkAdminAuth()" id="nav-admin" class="nav-btn px-5 py-2.5 rounded-lg text-[10px] font-black uppercase text-zinc-500 transition-all">Admin</button>
        </div>
    </div>
</header>

<main class="p-5 max-w-2xl mx-auto">
    <!-- User View -->
    <section id="user-view" class="tab-content active">
        <div id="group-section">
            <div class="flex space-x-2 overflow-x-auto no-scrollbar mb-8">
                <button onclick="setRound(1)" id="round-1" class="flex-1 min-w-[100px] py-3.5 rounded-xl text-[10px] font-black uppercase border border-white/5 transition-all">Round 1</button>
                <button onclick="setRound(2)" id="round-2" class="flex-1 min-w-[100px] py-3.5 rounded-xl text-[10px] font-black uppercase border border-white/5 transition-all">Round 2</button>
                <button onclick="setRound(3)" id="round-3" class="flex-1 min-w-[100px] py-3.5 rounded-xl text-[10px] font-black uppercase border border-white/5 transition-all">Round 3</button>
            </div>

            <div class="space-y-10">
                <div>
                    <div class="flex items-center justify-between mb-4 px-2">
                        <h3 class="text-[11px] font-black uppercase tracking-[0.2em] text-red-600 italic">Match Schedule</h3>
                        <div class="h-[1px] flex-1 bg-zinc-800 ml-4"></div>
                    </div>
                    <div id="fixture-container" class="space-y-4"></div>
                </div>

                <div>
                    <div class="flex items-center justify-between mb-4 px-2">
                        <h3 class="text-[11px] font-black uppercase tracking-[0.2em] text-zinc-500 italic">League Standings</h3>
                        <div class="h-[1px] flex-1 bg-zinc-800 ml-4"></div>
                    </div>
                    <div id="standings-container" class="space-y-8"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Admin Panel -->
    <section id="admin-panel" class="tab-content space-y-8">
        <div class="glass-panel rounded-[2rem] p-8">
            <h3 class="text-xs font-black uppercase text-red-600 mb-6 tracking-widest">Admin Dashboard</h3>
            <p class="text-[10px] text-zinc-500 mb-2 uppercase">Bulk Player Import</p>
            <textarea id="playerInput" rows="5" class="w-full bg-black border border-white/10 rounded-2xl p-5 text-xs text-zinc-300 mb-6 outline-none focus:border-red-600" placeholder="Enter 48 names..."></textarea>
            <button onclick="initLeague()" class="w-full red-gradient py-4 rounded-xl text-[10px] font-black uppercase">Draw & Sync New League</button>
        </div>
        <div id="admin-matches" class="space-y-4"></div>
    </section>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBO_TmNXPkY2-vvDtcP8j7YX6HU-8lRpV4",
        authDomain: "theoneproleague.firebaseapp.com",
        projectId: "theoneproleague",
        appId: "1:983758717301:web:cac06eddc7160a2049133c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const appId = "the-one-pro-league-v1";
    const G_NAMES = "ABCDEFGHIJKL".split("");
    const MAIN_DATA_PATH = ['artifacts', appId, 'public', 'data', 'leagueData', 'current'];

    let state = {
        teams: [],
        matches: [],
        activeRound: 1,
        isAdmin: false,
        user: null
    };

    // --- Draggable Bubble Logic (Updated) ---
    const bubble = document.getElementById('draggable-bubble');
    let isDragging = false;
    let currentX = 0;
    let currentY = 0;
    let initialX;
    let initialY;
    let xOffset = 0;
    let yOffset = 0;
    let dragStartTime;
    let hasMoved = false;

    function dragStart(e) {
        dragStartTime = Date.now();
        hasMoved = false;
        if (e.type === "touchstart") {
            initialX = e.touches[0].clientX - xOffset;
            initialY = e.touches[0].clientY - yOffset;
        } else {
            initialX = e.clientX - xOffset;
            initialY = e.clientY - yOffset;
        }
        if (e.target === bubble || bubble.contains(e.target)) isDragging = true;
    }

    function dragEnd(e) {
        const dragDuration = Date.now() - dragStartTime;
        initialX = currentX;
        initialY = currentY;
        isDragging = false;

        // Click detection: It's a click if duration is short and it hasn't moved much
        if (!hasMoved || dragDuration < 150) {
            window.open('https://t.me/agust_nadi', '_blank');
        }
    }

    function drag(e) {
        if (isDragging) {
            e.preventDefault();
            hasMoved = true;
            if (e.type === "touchmove") {
                currentX = e.touches[0].clientX - initialX;
                currentY = e.touches[0].clientY - initialY;
            } else {
                currentX = e.clientX - initialX;
                currentY = e.clientY - initialY;
            }
            xOffset = currentX;
            yOffset = currentY;
            bubble.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
        }
    }

    bubble.addEventListener("touchstart", dragStart, {passive: false});
    bubble.addEventListener("touchend", dragEnd, {passive: false});
    bubble.addEventListener("touchmove", drag, {passive: false});
    bubble.addEventListener("mousedown", dragStart, false);
    bubble.addEventListener("mouseup", dragEnd, false);
    bubble.addEventListener("mousemove", drag, false);

    // --- Firebase Logic ---
    const initAuth = async () => { try { await signInAnonymously(auth); } catch (e) { console.error(e); } };
    onAuthStateChanged(auth, (user) => { state.user = user; if (user) setupRealtimeListener(); });
    initAuth();

    function setupRealtimeListener() {
        const docRef = doc(db, ...MAIN_DATA_PATH);
        onSnapshot(docRef, (snap) => {
            if (snap.exists()) {
                const data = snap.data();
                state.teams = data.teams || [];
                state.matches = data.matches || [];
                render();
            }
            document.getElementById('loading-screen').style.display = 'none';
        });
    }

    window.switchTab = (id) => {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        render();
    };

    window.toggleModal = (id, show) => document.getElementById(id).classList.toggle('hidden', !show);
    window.checkAdminAuth = () => state.isAdmin ? switchTab('admin-panel') : toggleModal('admin-modal', true);
    window.handleLogin = () => {
        if (document.getElementById('adminPass').value === "1234") {
            state.isAdmin = true;
            toggleModal('admin-modal', false);
            switchTab('admin-panel');
        } else alert("မှားယွင်းနေပါသည်။");
    };

    window.setRound = (r) => { state.activeRound = r; render(); };

    function render() {
        const getScoreClass = (s1, s2) => s1 === null || s2 === null ? 'text-zinc-600' : (s1 > s2 ? 'score-win' : (s1 < s2 ? 'score-loss' : 'score-draw'));

        [1,2,3].forEach(i => {
            const btn = document.getElementById(`round-${i}`);
            if (btn) btn.className = `flex-1 min-w-[100px] py-3.5 rounded-xl text-[10px] font-black uppercase border border-white/5 transition-all ${state.activeRound === i ? 'bg-red-600 text-white shadow-lg' : 'bg-zinc-900 text-zinc-500'}`;
        });

        const rdMatches = state.matches.filter(m => m.round === state.activeRound).sort((a,b) => a.group.localeCompare(b.group));
        const fCont = document.getElementById('fixture-container');
        if (fCont) {
            let lastG = "";
            fCont.innerHTML = rdMatches.map(m => {
                let header = m.group !== lastG ? `<div class="pt-4 pb-2 text-[9px] font-black text-zinc-700 tracking-[0.4em] uppercase text-center italic">Group ${m.group = (lastG = m.group, m.group)}</div>` : "";
                const h = state.teams.find(t=>t.id===m.home), a = state.teams.find(t=>t.id===m.away);
                return header + `<div class="glass-panel p-4 rounded-2xl flex items-center justify-between"><div class="flex-1 text-right pr-4 text-[11px] font-bold truncate">${h?.name}</div><div class="flex items-center space-x-1.5 shrink-0"><div class="score-box ${getScoreClass(m.hS, m.aS)}">${m.hS ?? '-'}</div><div class="score-box ${getScoreClass(m.aS, m.hS)}">${m.aS ?? '-'}</div></div><div class="flex-1 text-left pl-4 text-[11px] font-bold truncate">${a?.name}</div></div>`;
            }).join('');
        }

        const sCont = document.getElementById('standings-container');
        if (sCont) {
            const groups = G_NAMES.filter(g => state.teams.some(t => t.group === g));
            sCont.innerHTML = groups.map(g => {
                const gt = state.teams.filter(t => t.group === g).sort((a,b) => b.pts - a.pts || b.gd - a.gd);
                return `<div class="bg-zinc-900/30 rounded-3xl p-4 border border-white/5"><div class="flex justify-between items-center mb-3 px-2"><span class="text-[10px] font-black uppercase text-red-600 tracking-widest italic">Group ${g}</span></div><table class="standing-table text-[10px]"><thead><tr><th class="col-player">NAME</th><th>P</th><th>GD</th><th class="text-red-600">PTS</th></tr></thead><tbody>${gt.map((t, i) => `<tr class="${i<2?'text-white':'text-zinc-500'}"><td class="col-player font-bold"><span class="opacity-20 mr-2 text-[8px]">${i+1}</span>${t.name}</td><td>${t.p}</td><td class="${t.gd>0?'text-green-500':(t.gd<0?'text-red-500':'')}">${t.gd>0?'+'+t.gd:t.gd}</td><td class="font-black text-xs ${i<2?'text-red-600 neon-text':''}">${t.pts}</td></tr>`).join('')}</tbody></table></div>`;
            }).join('');
        }
    }
</script>
</body>
</html>
