<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE ONE PRO LEAGUE - LIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Outfit:wght@700;900&display=swap');

        :root {
            --neon-red: #ff003c;
            --neon-glow: rgba(255, 0, 60, 0.5);
            --dark-bg: #050505;
            --card-bg: #0f0f0f;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--dark-bg); 
            color: #ffffff;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .heading-font { font-family: 'Outfit', sans-serif; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .neon-text { text-shadow: 0 0 10px var(--neon-glow); }
        .red-gradient { background: linear-gradient(135deg, #ff003c 0%, #bc002d 100%); }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }

        .standing-table { width: 100%; border-collapse: separate; border-spacing: 0 4px; }
        .standing-table th { color: #555; font-size: 9px; text-transform: uppercase; padding: 12px 4px; letter-spacing: 0.1em; }
        .standing-table td { background: rgba(255,255,255,0.02); padding: 12px 4px; text-align: center; }

        .col-player { text-align: left !important; padding-left: 12px !important; width: 40%; }
        .score-box {
            background: #000;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-weight: 900;
            font-size: 14px;
            border: 1px solid #222;
        }

        .score-win { color: #22c55e; border-color: rgba(34, 197, 94, 0.3); }
        .score-loss { color: #ef4444; border-color: rgba(239, 68, 68, 0.3); }
        .score-draw { color: #eab308; border-color: rgba(234, 179, 8, 0.3); }

        .loading-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .nav-btn.active { background: var(--neon-red); color: white; box-shadow: 0 4px 15px var(--neon-glow); }
    </style>
</head>
<body class="no-scrollbar pb-20">

<div id="loading-screen" class="loading-screen">
    <div class="w-12 h-12 border-4 border-zinc-800 border-t-red-600 rounded-full animate-spin mb-4"></div>
    <p class="text-[10px] font-black tracking-[0.3em] text-zinc-500 uppercase">Live Synchronizing</p>
</div>

<!-- Admin Login Modal -->
<div id="admin-modal" class="fixed inset-0 z-[60] bg-black/95 flex items-center justify-center p-6 hidden">
    <div class="w-full max-w-xs space-y-6">
        <div class="text-center">
            <h2 class="heading-font text-xl uppercase italic">Admin <span class="text-red-600">Access</span></h2>
            <p class="text-[9px] text-zinc-500 tracking-widest mt-1 uppercase">Enter Code to Edit</p>
        </div>
        <input type="password" id="adminPass" class="w-full bg-zinc-900 border border-white/10 rounded-2xl p-4 text-center tracking-[1em] outline-none focus:border-red-600 transition-all" placeholder="••••">
        <button onclick="handleLogin()" class="w-full red-gradient p-4 rounded-2xl font-black uppercase text-xs shadow-lg">Login</button>
        <button onclick="toggleModal('admin-modal', false)" class="w-full text-zinc-600 text-[10px] font-bold uppercase">Cancel</button>
    </div>
</div>

<header class="sticky top-0 z-40 bg-black/80 backdrop-blur-lg border-b border-white/5 px-6 py-5">
    <div class="flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 red-gradient rounded-xl flex items-center justify-center shadow-2xl">
                <i class="fas fa-bolt text-white text-lg"></i>
            </div>
            <div>
                <h1 class="heading-font text-lg leading-none tracking-tight italic">THE ONE <span class="text-red-600">PRO</span></h1>
                <p class="text-[8px] text-zinc-500 font-black tracking-[0.2em] uppercase mt-1">Real-time League Table</p>
            </div>
        </div>
        <div class="flex bg-zinc-900 p-1 rounded-xl">
            <button onclick="switchTab('user-view')" id="nav-user" class="nav-btn active px-5 py-2.5 rounded-lg text-[10px] font-black uppercase transition-all">Public</button>
            <button onclick="checkAdminAuth()" id="nav-admin" class="nav-btn px-5 py-2.5 rounded-lg text-[10px] font-black uppercase text-zinc-500 transition-all">Admin</button>
        </div>
    </div>
</header>

<main class="p-5 max-w-2xl mx-auto">
    <!-- User View -->
    <section id="user-view" class="tab-content active">
        <div id="group-section">
            <div class="flex space-x-2 overflow-x-auto no-scrollbar mb-8">
                <button onclick="setRound(1)" id="round-1" class="flex-1 min-w-[100px] py-3.5 rounded-xl text-[10px] font-black uppercase border border-white/5 transition-all">Round 1</button>
                <button onclick="setRound(2)" id="round-2" class="flex-1 min-w-[100px] py-3.5 rounded-xl text-[10px] font-black uppercase border border-white/5 transition-all">Round 2</button>
                <button onclick="setRound(3)" id="round-3" class="flex-1 min-w-[100px] py-3.5 rounded-xl text-[10px] font-black uppercase border border-white/5 transition-all">Round 3</button>
            </div>

            <div class="space-y-10">
                <div>
                    <div class="flex items-center justify-between mb-4 px-2">
                        <h3 class="text-[11px] font-black uppercase tracking-[0.2em] text-red-600 italic">Match Schedule</h3>
                        <div class="h-[1px] flex-1 bg-zinc-800 ml-4"></div>
                    </div>
                    <div id="fixture-container" class="space-y-4"></div>
                </div>

                <div>
                    <div class="flex items-center justify-between mb-4 px-2">
                        <h3 class="text-[11px] font-black uppercase tracking-[0.2em] text-zinc-500 italic">League Standings</h3>
                        <div class="h-[1px] flex-1 bg-zinc-800 ml-4"></div>
                    </div>
                    <div id="standings-container" class="space-y-8"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Admin Panel -->
    <section id="admin-panel" class="tab-content space-y-8">
        <div class="glass-panel rounded-[2rem] p-8">
            <h3 class="text-xs font-black uppercase text-red-600 mb-6 tracking-widest">Admin Dashboard</h3>
            <textarea id="playerInput" rows="5" class="w-full bg-black border border-white/10 rounded-2xl p-5 text-xs text-zinc-300 mb-6 outline-none focus:border-red-600" placeholder="Enter 48 names..."></textarea>
            <button onclick="initLeague()" class="w-full red-gradient py-4 rounded-xl text-[10px] font-black uppercase">Draw & Sync New League</button>
        </div>

        <div class="space-y-3">
            <div class="flex items-center justify-between px-2">
                <span class="text-[10px] font-black uppercase text-zinc-600">Enter Results</span>
                <span class="text-[8px] text-green-500 uppercase flex items-center">
                    <span class="w-1 h-1 bg-green-500 rounded-full mr-2 animate-pulse"></span>
                    Live Sync Enabled
                </span>
            </div>
            <div id="admin-matches" class="space-y-3"></div>
        </div>
    </section>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyBO_TmNXPkY2-vvDtcP8j7YX6HU-8lRpV4",
        authDomain: "theoneproleague.firebaseapp.com",
        projectId: "theoneproleague",
        appId: "1:983758717301:web:cac06eddc7160a2049133c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const appId = "the-one-neon-v1";
    const G_NAMES = "ABCDEFGHIJKL".split("");

    let state = {
        teams: [],
        matches: [],
        activeRound: 1,
        isAdmin: false
    };

    // --- OnSnapshot: Real-time Data Sync ---
    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            await signInAnonymously(auth);
        } else {
            // Firestore data ကို listen လုပ်ထားမည်
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'mainData'), (snap) => {
                if (snap.exists()) {
                    const data = snap.data();
                    state.teams = data.teams || [];
                    state.matches = data.matches || [];
                    render();
                }
                document.getElementById('loading-screen').style.display = 'none';
            }, (error) => {
                console.error("Sync Error:", error);
                document.getElementById('loading-screen').style.display = 'none';
            });
        }
    });

    window.switchTab = (id) => {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        const isAdmin = id === 'admin-panel';
        document.getElementById('nav-admin').className = `nav-btn px-5 py-2.5 rounded-lg text-[10px] font-black uppercase ${isAdmin ? 'active' : 'text-zinc-500'}`;
        document.getElementById('nav-user').className = `nav-btn px-5 py-2.5 rounded-lg text-[10px] font-black uppercase ${!isAdmin ? 'active' : 'text-zinc-500'}`;
    };

    window.toggleModal = (id, show) => document.getElementById(id).classList.toggle('hidden', !show);

    window.checkAdminAuth = () => {
        if (state.isAdmin) switchTab('admin-panel');
        else toggleModal('admin-modal', true);
    };

    window.handleLogin = () => {
        if (document.getElementById('adminPass').value === "1234") {
            state.isAdmin = true;
            toggleModal('admin-modal', false);
            switchTab('admin-panel');
        }
    };

    window.setRound = (r) => {
        state.activeRound = r;
        render();
    };

    window.initLeague = async () => {
        const names = document.getElementById('playerInput').value.split('\n').filter(n => n.trim() !== "");
        if (names.length !== 48) return alert("Please enter exactly 48 names.");

        const shuffled = names.sort(() => Math.random() - 0.5);
        const teams = shuffled.map((name, i) => ({
            id: i + 1,
            name: name.trim(),
            p: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, gd: 0, pts: 0,
            group: G_NAMES[Math.floor(i / 4)]
        }));

        const matches = [];
        let mid = 1;
        G_NAMES.forEach(g => {
            const gt = teams.filter(t => t.group === g);
            const pairings = [[0,1,1],[2,3,1],[0,2,2],[1,3,2],[0,3,3],[1,2,3]];
            pairings.forEach(p => {
                matches.push({ id: mid++, group: g, round: p[2], home: gt[p[0]].id, away: gt[p[1]].id, hS: null, aS: null });
            });
        });

        // Firebase သို့ data တင်မည်၊ snapshot ကြောင့် UI အလိုလို update ဖြစ်မည်
        await setDoc(doc(db, 'artifacts', appId, 'public', 'mainData'), { teams, matches });
    };

    window.updateScore = async (id, val, side) => {
        const score = val === "" ? null : parseInt(val);
        const matchIndex = state.matches.findIndex(x => x.id === id);
        if (matchIndex === -1) return;

        // Local state update
        if (side === 'home') state.matches[matchIndex].hS = score;
        else state.matches[matchIndex].aS = score;

        // Recalculate Table from local matches
        let updatedTeams = state.teams.map(x => ({ ...x, p: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, gd: 0, pts: 0 }));
        state.matches.forEach(match => {
            if (match.hS !== null && match.aS !== null) {
                const h = updatedTeams.find(x => x.id === match.home);
                const a = updatedTeams.find(x => x.id === match.away);
                if (h && a) {
                    h.p++; a.p++; h.gf += match.hS; h.ga += match.aS; a.gf += match.aS; a.ga += match.hS;
                    if (match.hS > match.aS) { h.w++; h.pts += 3; a.l++; }
                    else if (match.hS < match.aS) { a.w++; a.pts += 3; h.l++; }
                    else { h.d++; a.d++; h.pts += 1; a.pts += 1; }
                    h.gd = h.gf - h.ga; a.gd = a.gf - a.ga;
                }
            }
        });

        // Sync to Firebase
        await updateDoc(doc(db, 'artifacts', appId, 'public', 'mainData'), { 
            teams: updatedTeams, 
            matches: state.matches
        });
    };

    function render() {
        const getScoreClass = (s1, s2) => {
            if (s1 === null || s2 === null) return 'text-zinc-600';
            return s1 > s2 ? 'score-win' : (s1 < s2 ? 'score-loss' : 'score-draw');
        };

        // Rounds
        for(let i=1; i<=3; i++) {
            const b = document.getElementById(`round-${i}`);
            if(b) b.className = `flex-1 min-w-[100px] py-3.5 rounded-xl text-[10px] font-black uppercase border border-white/5 transition-all ${state.activeRound === i ? 'bg-red-600 text-white shadow-lg' : 'bg-zinc-900 text-zinc-500'}`;
        }

        // Public Fixtures
        const fCont = document.getElementById('fixture-container');
        const rdMatches = state.matches.filter(m => m.round === state.activeRound).sort((a,b) => a.group.localeCompare(b.group));
        let lastG = "";
        fCont.innerHTML = rdMatches.map(m => {
            let html = "";
            if (m.group !== lastG) {
                lastG = m.group;
                html = `<div class="pt-4 pb-2 text-[9px] font-black text-zinc-700 tracking-[0.4em] uppercase text-center italic">Group ${m.group}</div>`;
            }
            const h = state.teams.find(t=>t.id===m.home), a = state.teams.find(t=>t.id===m.away);
            return html + `
                <div class="glass-panel p-4 rounded-2xl flex items-center justify-between">
                    <div class="flex-1 text-right pr-4 text-[11px] font-bold truncate">${h?.name || 'TBD'}</div>
                    <div class="flex items-center space-x-1.5 shrink-0">
                        <div class="score-box ${getScoreClass(m.hS, m.aS)}">${m.hS ?? '-'}</div>
                        <div class="score-box ${getScoreClass(m.aS, m.hS)}">${m.aS ?? '-'}</div>
                    </div>
                    <div class="flex-1 text-left pl-4 text-[11px] font-bold truncate">${a?.name || 'TBD'}</div>
                </div>`;
        }).join('');

        // Public Standings
        const sCont = document.getElementById('standings-container');
        sCont.innerHTML = G_NAMES.map(g => {
            const gt = state.teams.filter(t => t.group === g).sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.ga);
            if (gt.length === 0) return "";
            return `
                <div class="bg-zinc-900/30 rounded-3xl p-4 border border-white/5">
                    <div class="flex justify-between items-center mb-3 px-2">
                        <span class="text-[10px] font-black uppercase text-red-600 tracking-widest italic">Group ${g}</span>
                    </div>
                    <table class="standing-table text-[10px]">
                        <thead><tr><th class="col-player">NAME</th><th>P</th><th>GD</th><th class="text-red-600">PTS</th></tr></thead>
                        <tbody>${gt.map((t, i) => `
                            <tr class="${i<2?'text-white':'text-zinc-500'}">
                                <td class="col-player font-bold"><span class="opacity-20 mr-2 text-[8px]">${i+1}</span>${t.name}</td>
                                <td>${t.p}</td>
                                <td class="${t.gd>0?'text-green-500':(t.gd<0?'text-red-500':'')}">${t.gd>0?'+'+t.gd:t.gd}</td>
                                <td class="font-black text-xs ${i<2?'text-red-600 neon-text':''}">${t.pts}</td>
                            </tr>`).join('')}</tbody>
                    </table>
                </div>`;
        }).join('');

        // Admin Match List
        const aMatches = document.getElementById('admin-matches');
        if (aMatches && state.isAdmin) {
            aMatches.innerHTML = state.matches.map(m => {
                const h = state.teams.find(t=>t.id===m.home), a = state.teams.find(t=>t.id===m.away);
                return `
                    <div class="bg-zinc-950 p-4 rounded-2xl border border-white/5 flex items-center justify-between">
                        <span class="text-[8px] font-black text-zinc-700 w-12">Grp ${m.group}</span>
                        <div class="flex-1 flex items-center justify-center space-x-2">
                            <span class="text-[10px] font-bold truncate w-20 text-right">${h?.name || 'TBD'}</span>
                            <input type="number" value="${m.hS ?? ''}" onchange="updateScore(${m.id}, this.value, 'home')" class="w-10 h-10 bg-black rounded-lg text-center text-xs font-black border border-white/10">
                            <input type="number" value="${m.aS ?? ''}" onchange="updateScore(${m.id}, this.value, 'away')" class="w-10 h-10 bg-black rounded-lg text-center text-xs font-black border border-white/10">
                            <span class="text-[10px] font-bold truncate w-20 text-left">${a?.name || 'TBD'}</span>
                        </div>
                    </div>`;
            }).join('');
        }
    }
</script>
</body>
</html>
