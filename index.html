<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        
        :root {
            --neon-red: #ff003c;
            --neon-glow: rgba(255, 0, 60, 0.6);
            --dark-bg: #050505;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--dark-bg); 
            color: #ffffff;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .neon-text { text-shadow: 0 0 10px var(--neon-glow), 0 0 20px var(--neon-glow); }
        .red-gradient { background: linear-gradient(135deg, #ff003c 0%, #9e0025 100%); }

        .standing-table { font-size: 10px; width: 100%; border-collapse: separate; border-spacing: 0 4px; table-layout: fixed; }
        .standing-table th { color: #666; font-size: 8px; text-transform: uppercase; padding: 8px 2px; text-align: center; }
        .standing-table td { background: rgba(255,255,255,0.02); padding: 10px 2px; text-align: center; vertical-align: middle; }
        
        .col-player { width: 35%; text-align: left !important; padding-left: 8px !important; }
        .col-stat { width: 8%; }
        .col-pts { width: 12%; }

        .standing-table tr td:first-child { border-radius: 8px 0 0 8px; }
        .standing-table tr td:last-child { border-radius: 0 8px 8px 0; }

        .score-box {
            background: #000; width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 8px; font-weight: 900; font-size: 13px;
            border: 1px solid #222;
        }

        .score-win { color: #22c55e !important; border-color: rgba(34, 197, 94, 0.4) !important; }
        .score-loss { color: #ef4444 !important; border-color: rgba(239, 68, 68, 0.4) !important; }
        .score-draw { color: #eab308 !important; border-color: rgba(234, 179, 8, 0.4) !important; }

        .glass-header {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .active-round-btn {
            background: var(--neon-red) !important;
            color: white !important;
            box-shadow: 0 0 10px var(--neon-glow);
        }

        .loading-overlay { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; align-items: center; justify-content: center; }

        .group-divider-text {
            color: var(--neon-red);
            text-shadow: 0 0 8px var(--neon-glow);
            letter-spacing: 0.2em;
        }

        .sponsor-slider-container {
            overflow: hidden;
            background: #000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            width: 100%;
        }

        .sponsor-track {
            display: flex;
            width: fit-content;
            animation: scroll 20s linear infinite;
        }

        .sponsor-item {
            width: 160px;
            height: 80px;
            flex-shrink: 0;
            margin: 0;
            padding: 0;
            overflow: hidden;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            display: block;
        }

        .sponsor-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(0%) brightness(1); 
            transition: all 0.3s ease;
        }

        .sponsor-item:hover img {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-960px); } 
        }
    </style>
</head>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBO_TmNXPkY2-vvDtcP8j7YX6HU-8lRpV4",
            authDomain: "theoneproleague.firebaseapp.com",
            projectId: "theoneproleague",
            appId: "1:983758717301:web:cac06eddc7160a2049133c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = "the-one-neon-v1"; 

        let state = { teams: [], matches: [], koMatches: [], isKnockoutStarted: false, currentRound: 1, isAdminAuthenticated: false };

        onAuthStateChanged(auth, async (u) => {
            if (!u) await signInAnonymously(auth);
            else {
                onSnapshot(doc(db, 'artifacts', appId, 'public', 'mainData'), (snap) => {
                    if (snap.exists()) { 
                        Object.assign(state, snap.data()); 
                        renderAll(); 
                    }
                    document.getElementById('loading-screen').style.display = 'none';
                });
            }
        });

        window.openAdminLogin = () => { if(state.isAdminAuthenticated) { showTab('admin-panel'); return; } document.getElementById('admin-login-modal').classList.remove('hidden'); };
        window.closeAdminLogin = () => document.getElementById('admin-login-modal').classList.add('hidden');
        window.attemptLogin = () => {
            if(document.getElementById('adminPasswordInput').value === "1234") {
                state.isAdminAuthenticated = true; closeAdminLogin(); showTab('admin-panel');
            }
        };

        window.showTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            const isA = id === 'admin-panel';
            document.getElementById('btn-admin').className = isA ? "px-4 py-2 rounded-lg text-[9px] font-black uppercase bg-red-600 text-white" : "px-4 py-2 rounded-lg text-[9px] font-black uppercase text-zinc-500";
            document.getElementById('btn-user').className = !isA ? "px-4 py-2 rounded-lg text-[9px] font-black uppercase bg-red-600 text-white" : "px-4 py-2 rounded-lg text-[9px] font-black uppercase text-zinc-500";
        };

        window.generateTournamentData = async () => {
            const raw = document.getElementById('teamInput').value.split('\n').filter(n => n.trim() !== "");
            if (raw.length !== 48) return;
            const gNames = "ABCDEFGHIJKL".split("");
            const teams = raw.sort(() => Math.random() - 0.5).map((n, i) => ({ id: i + 1, name: n.trim(), p: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, gd: 0, pts: 0, group: gNames[Math.floor(i / 4)] }));
            const matches = []; let mId = 1;
            gNames.forEach(g => {
                const gt = teams.filter(t => t.group === g);
                [[0,1],[2,3],[0,2],[1,3],[0,3],[1,2]].forEach((p, idx) => matches.push({id: mId++, round: Math.floor(idx/2)+1, group: g, home: gt[p[0]].id, away: gt[p[1]].id, hS: null, aS: null}));
            });
            await setDoc(doc(db, 'artifacts', appId, 'public', 'mainData'), { teams, matches, koMatches: [], isKnockoutStarted: false });
        };

        window.updateScore = async (id, val, side, isKo) => {
            const s = val === "" ? null : parseInt(val);
            let targetM = isKo ? [...state.koMatches] : [...state.matches];
            const m = targetM.find(x => x.id === id);
            if(side === 'home') m.hS = s; else m.aS = s;
            
            let t = state.teams.map(x => ({...x, p:0, w:0, d:0, l:0, gf:0, ga:0, gd:0, pts:0}));
            state.matches.forEach(match => {
                if(match.hS !== null && match.aS !== null) {
                    const h = t.find(x => x.id === match.home), a = t.find(x => x.id === match.away);
                    h.p++; a.p++; h.gf += match.hS; h.ga += match.aS; a.gf += match.aS; a.ga += match.hS;
                    if(match.hS > match.aS) { h.w++; h.pts+=3; a.l++; } else if(match.hS < match.aS) { a.w++; a.pts+=3; h.l++; } else { h.d++; a.d++; h.pts+=1; a.pts+=1; }
                    h.gd = h.gf - h.ga; a.gd = a.gf - a.ga;
                }
            });

            if(isKo) {
                targetM.forEach(m => { 
                    if(m.hS !== null && m.aS !== null && m.nextMatch) { 
                        const winner = m.hS >= m.aS ? m.home : m.away; 
                        const nm = targetM.find(x => x.id === m.nextMatch); 
                        if(nm) { if(m.nextPos === 'home') nm.home = winner; else nm.away = winner; }
                    } 
                });
            }
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'mainData'), { teams: t, matches: state.matches, koMatches: state.koMatches });
        };

        window.advanceToKnockout = async () => {
            const gNames = "ABCDEFGHIJKL".split(""); 
            const pot1 = []; const pot2 = []; const pot3 = []; 
            gNames.forEach(g => { 
                const gt = state.teams.filter(t => t.group === g).sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf); 
                pot1.push(gt[0]); pot2.push(gt[1]); pot3.push(gt[2]);
            });
            const bestThirds = pot3.sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf).slice(0, 8);
            const finalPairings = [];
            const tempPot1 = [...pot1].sort(() => Math.random() - 0.5);
            const tempRest = [...pot2, ...bestThirds].sort(() => Math.random() - 0.5);
            for(let i=0; i<16; i++) {
                let home = tempPot1.length > 0 ? tempPot1.pop() : tempRest.pop();
                let awayIndex = tempRest.findIndex(t => t.group !== home.group);
                if (awayIndex === -1) awayIndex = 0; 
                let away = tempRest.splice(awayIndex, 1)[0];
                finalPairings.push({ home: home.id, away: away.id });
            }
            finalPairings.sort(() => Math.random() - 0.5);
            const ko = [];
            for(let i=0; i<16; i++) ko.push({ id: 100+i, stage: 'R32', home: finalPairings[i].home, away: finalPairings[i].away, hS: null, aS: null, nextMatch: 200 + Math.floor(i/2), nextPos: i%2===0?'home':'away'});
            for(let i=0; i<8; i++) ko.push({ id: 200+i, stage: 'R16', home: null, away: null, hS: null, aS: null, nextMatch: 300 + Math.floor(i/2), nextPos: i%2===0?'home':'away'});
            for(let i=0; i<4; i++) ko.push({ id: 300+i, stage: 'QF', home: null, away: null, hS: null, aS: null, nextMatch: 400 + Math.floor(i/2), nextPos: i%2===0?'home':'away'});
            for(let i=0; i<2; i++) ko.push({ id: 400+i, stage: 'SF', home: null, away: null, hS: null, aS: null, nextMatch: 500, nextPos: i%2===0?'home':'away'});
            ko.push({ id: 500, stage: 'Final', home: null, away: null, hS: null, aS: null });
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'mainData'), { koMatches: ko, isKnockoutStarted: true });
        };

        function renderAll() {
            const getResultClass = (s1, s2) => (s1 === null || s2 === null) ? 'text-zinc-500' : (s1 > s2 ? 'score-win' : (s1 < s2 ? 'score-loss' : 'score-draw'));
            const groupDone = state.matches.length > 0 && state.matches.every(m => m.hS !== null && m.aS !== null);
            const koBtn = document.getElementById('admin-ko-btn');
            if(koBtn) {
                if(groupDone && !state.isKnockoutStarted) { koBtn.classList.remove('opacity-50', 'cursor-not-allowed'); koBtn.classList.add('red-gradient'); koBtn.disabled = false; }
                else if(state.isKnockoutStarted) { koBtn.innerText = "Knockout Started"; koBtn.disabled = true; koBtn.classList.add('opacity-50'); }
            }
            document.getElementById('user-sub-tabs').classList.toggle('hidden', !state.isKnockoutStarted);
            const adminList = document.getElementById('admin-match-list');
            if(adminList) {
                const data = state.isKnockoutStarted ? state.koMatches : state.matches;
                adminList.innerHTML = data.map(m => `
                    <div class="bg-zinc-950 p-4 rounded-2xl flex items-center justify-between border border-white/5">
                        <span class="text-[8px] font-black text-zinc-600 w-8">${m.stage || 'G' + m.group}</span>
                        <div class="flex-1 flex items-center justify-center space-x-2">
                            <span class="text-[10px] truncate w-20 text-right">${state.teams.find(t=>t.id===m.home)?.name || 'TBD'}</span>
                            <input type="number" value="${m.hS ?? ''}" onchange="updateScore(${m.id}, this.value, 'home', ${!!m.stage})" class="w-8 h-8 bg-black border border-zinc-800 rounded text-center text-xs outline-none focus:border-red-600">
                            <input type="number" value="${m.aS ?? ''}" onchange="updateScore(${m.id}, this.value, 'away', ${!!m.stage})" class="w-8 h-8 bg-black border border-zinc-800 rounded text-center text-xs outline-none focus:border-red-600">
                            <span class="text-[10px] truncate w-20 text-left">${state.teams.find(t=>t.id===m.away)?.name || 'TBD'}</span>
                        </div>
                    </div>`).join('');
            }
            const fixtureList = document.getElementById('user-fixture-list');
            const roundMatches = state.matches.filter(m => m.round === state.currentRound);
            let fHtml = ""; let lastG = "";
            roundMatches.sort((a,b)=>a.group.localeCompare(b.group)).forEach(m => {
                if(m.group !== lastG) { lastG = m.group; fHtml += `<div class="flex items-center space-x-4 py-4"><div class="h-[1px] flex-1 bg-zinc-900"></div><span class="group-divider-text text-[10px] font-black italic">Group ${m.group}</span><div class="h-[1px] flex-1 bg-zinc-900"></div></div>`; }
                fHtml += `<div class="bg-zinc-900/80 p-4 rounded-2xl border border-white/5 flex items-center justify-between">
                    <div class="flex-1 text-right text-[11px] truncate pr-3">${state.teams.find(t=>t.id===m.home)?.name}</div>
                    <div class="flex items-center space-x-1"><div class="score-box ${getResultClass(m.hS, m.aS)}">${m.hS ?? ''}</div><div class="score-box ${getResultClass(m.aS, m.hS)}">${m.aS ?? ''}</div></div>
                    <div class="flex-1 text-left text-[11px] truncate pl-3">${state.teams.find(t=>t.id===m.away)?.name}</div>
                </div>`;
            });
            if(fixtureList) fixtureList.innerHTML = fHtml;
            const tableCont = document.getElementById('group-tables-container');
            if(tableCont) {
                tableCont.innerHTML = "ABCDEFGHIJKL".split("").map(g => {
                    const gt = state.teams.filter(t => t.group === g).sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
                    return `<div class="bg-zinc-900/40 p-3 rounded-3xl border border-white/5"><div class="text-[10px] font-black text-red-600 uppercase mb-3 px-2">Group ${g}</div><table class="standing-table"><thead><tr><th class="col-player">PLAYER</th><th class="col-stat">P</th><th class="col-stat">GD</th><th class="col-pts">PTS</th></tr></thead><tbody>${gt.map((t,i) => `<tr class="${i<2?'text-white':'text-zinc-500'}"><td class="col-player font-bold truncate">${i+1}. ${t.name}</td><td class="col-stat">${t.p}</td><td class="col-stat ${t.gd>0?'text-green-500':''}">${t.gd}</td><td class="col-pts font-black ${i<2?'text-red-600 neon-text':''}">${t.pts}</td></tr>`).join('')}</tbody></table></div>`;
                }).join('');
            }
            const bracket = document.getElementById('knockout-bracket');
            if(state.isKnockoutStarted && bracket) {
                bracket.innerHTML = ['R32', 'R16', 'QF', 'SF', 'Final'].map(s => {
                    const km = state.koMatches.filter(m => m.stage === s);
                    return `<div class="space-y-4"><div class="text-[9px] font-black uppercase text-center text-red-600 tracking-[0.5em] mb-4">${s === 'R32' ? 'Round of 32' : (s === 'R16' ? 'Round of 16' : s)}</div><div class="grid grid-cols-1 md:grid-cols-2 gap-2">${km.map(m => {
                        const h = state.teams.find(t=>t.id===m.home); const a = state.teams.find(t=>t.id===m.away);
                        return `<div class="bg-zinc-900/60 p-4 rounded-2xl border border-white/5 space-y-2"><div class="flex justify-between items-center"><span class="text-[10px] ${m.hS > m.aS ? 'text-white' : 'text-zinc-500'}">${h?.name || 'TBD'}</span><span class="font-black text-xs ${getResultClass(m.hS, m.aS)}">${m.hS ?? '-'}</span></div><div class="flex justify-between items-center"><span class="text-[10px] ${m.aS > m.hS ? 'text-white' : 'text-zinc-500'}">${a?.name || 'TBD'}</span><span class="font-black text-xs ${getResultClass(m.aS, m.hS)}">${m.aS ?? '-'}</span></div></div>`;
                    }).join('')}</div></div>`;
                }).join('');
            }
        }
        window.toggleUserSubTab = (t) => {
            const isG = t === 'group';
            document.getElementById('group-stage-content').classList.toggle('hidden', !isG);
            document.getElementById('knockout-content').classList.toggle('hidden', isG);
            document.getElementById('sub-btn-group').className = isG ? "flex-1 py-3 rounded-xl text-[10px] font-black uppercase bg-red-600" : "flex-1 py-3 rounded-xl text-[10px] font-black uppercase text-zinc-500";
            document.getElementById('sub-btn-knock').className = !isG ? "flex-1 py-3 rounded-xl text-[10px] font-black uppercase bg-red-600" : "flex-1 py-3 rounded-xl text-[10px] font-black uppercase text-zinc-500";
        };
        window.filterRound = (r) => {
            state.currentRound = r;
            [1,2,3].forEach(i => { const btn = document.getElementById('rd-'+i); if(btn) btn.className = `flex-1 min-w-[100px] py-3 rounded-xl text-[10px] font-black uppercase bg-zinc-900 border border-white/5 ${i === r ? 'active-round-btn' : 'text-zinc-500'}`; });
            renderAll();
        };
    </script>
</body>
</html>
