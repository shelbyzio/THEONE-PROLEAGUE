<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ONE COMMUNITY - PRO LEAGUE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        :root {
            --primary-red: #ef4444;
            --primary-green: #22c55e;
            --primary-yellow: #eab308;
            --dark-bg: #0a0a0a;
            --card-bg: #111111;
            --border-color: #262626;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--dark-bg);
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(239, 68, 68, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(239, 68, 68, 0.08) 0%, transparent 40%);
            color: #ffffff;
            margin: 0;
            overflow-x: hidden;
        }

        .round-container {
            display: none; 
            animation: fadeIn 0.5s ease-out;
        }

        .round-container.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .round-title {
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: var(--primary-red);
            font-weight: 800;
            font-size: 1.5rem;
            margin-bottom: 2rem;
            padding: 1rem 0;
            border-bottom: 2px solid var(--primary-red);
            text-shadow: 0 0 15px rgba(239, 68, 68, 0.3);
        }

        .matchup {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 1.25rem;
            padding: 1.5rem;
            margin: 1rem 0;
            transition: all 0.3s ease;
            position: relative;
        }

        .match-badge {
            position: absolute;
            top: -10px;
            left: 20px;
            background: var(--primary-red);
            color: white;
            font-size: 0.65rem;
            font-weight: 900;
            padding: 2px 10px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .score-box {
            min-width: 32px;
            height: 32px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.9rem;
            color: #888;
        }

        .score-win { color: var(--primary-green) !important; border-color: rgba(34, 197, 94, 0.3) !important; }
        .score-lose { color: var(--primary-red) !important; border-color: rgba(239, 68, 68, 0.3) !important; }
        .score-draw { color: var(--primary-yellow) !important; border-color: rgba(234, 179, 8, 0.3) !important; }

        .nav-btn {
            padding: 0.75rem 2rem;
            border-radius: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        .hidden-view { display: none !important; }
        
        .admin-score-input {
            width: 50px;
            height: 40px;
            background: #000;
            border: 1px solid #444;
            color: white;
            text-align: center;
            border-radius: 8px;
            font-weight: 800;
        }

        .modal-bg {
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
        }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: var(--dark-bg);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s;
        }

        .user-profile-img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid var(--primary-red);
        }
    </style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading" class="loading-overlay">
    <div class="w-12 h-12 border-4 border-red-600 border-t-transparent rounded-full animate-spin mb-4"></div>
    <div id="loading-text" class="text-[10px] font-bold text-neutral-500 uppercase tracking-widest">Connecting...</div>
</div>

<!-- Navbar Area -->
<nav class="p-4 flex justify-between items-center max-w-6xl mx-auto">
    <div class="text-xs font-black text-red-600 tracking-widest uppercase italic">The One Community</div>
    <div id="user-area" class="flex items-center gap-3">
        <button id="login-nav-btn" onclick="openAuthModal()" class="text-[9px] font-bold bg-neutral-900 px-4 py-2 rounded-full border border-neutral-800 uppercase tracking-tighter">Login</button>
        <div id="user-info" class="hidden flex items-center gap-2">
            <span id="user-name" class="text-[10px] font-bold text-neutral-400"></span>
            <img id="user-photo" class="user-profile-img" src="" alt="user">
            <button onclick="handleLogout()" class="text-[9px] font-bold text-red-500 ml-2">Logout</button>
        </div>
    </div>
</nav>

<!-- Header -->
<header class="pt-6 pb-6 text-center px-4">
    <h1 class="text-4xl font-extrabold mb-2 tracking-tighter text-white uppercase italic">THE ONE PRO LEAGUE</h1>
    <div class="flex justify-center gap-3 mt-6">
        <button onclick="toggleMainView('bracket')" id="bracket-btn" class="px-6 py-2 rounded-lg bg-red-600 text-white font-bold text-[10px] uppercase tracking-widest transition-all">Bracket View</button>
        <button id="admin-panel-toggle" onclick="toggleMainView('admin')" class="hidden px-6 py-2 rounded-lg bg-neutral-900 text-neutral-500 font-bold text-[10px] uppercase tracking-widest transition-all">Admin Panel</button>
    </div>
</header>

<!-- Bracket View Section -->
<main id="bracket-view" class="max-w-xl mx-auto px-4 pb-24">
    <div id="rounds-wrapper"></div>
    
    <div class="flex justify-between items-center mt-8 pt-6 border-t border-neutral-800">
        <button id="prev-round" onclick="changeRound(-1)" class="nav-btn bg-neutral-800 text-neutral-400">ရှေ့သို့</button>
        <div id="round-indicator" class="text-[10px] font-black text-neutral-500 uppercase tracking-[0.3em]">အဆင့် ၁ / ၅</div>
        <button id="next-round" onclick="changeRound(1)" class="nav-btn bg-red-600 text-white shadow-lg shadow-red-900/20">နောက်တစ်ဆင့်</button>
    </div>
</main>

<!-- Admin View Section -->
<div id="admin-view" class="hidden-view px-4 pb-24 max-w-2xl mx-auto">
    <div class="bg-[#111] border border-neutral-800 rounded-3xl p-6">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-black text-white uppercase italic">ရမှတ်များ စာရင်းသွင်းရန်</h2>
            <div class="flex gap-4 items-center">
                <button onclick="confirmReset()" class="text-[9px] font-bold text-red-500 hover:text-red-400 uppercase tracking-widest border border-red-900/30 px-3 py-1 rounded-md">Reset Tournament</button>
            </div>
        </div>
        <div id="admin-match-list" class="space-y-4"></div>
    </div>
</div>

<!-- Login Modal -->
<div id="auth-modal" class="fixed inset-0 z-50 flex items-center justify-center hidden p-4 modal-bg">
    <div class="bg-neutral-900 border border-neutral-800 p-8 rounded-3xl w-full max-w-sm shadow-2xl">
        <div class="text-center mb-6">
            <div class="inline-block p-3 rounded-full bg-red-600/10 mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-red-600"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
            <h3 class="text-lg font-bold text-white">Login Required</h3>
            <p class="text-neutral-500 text-xs mt-1">ပွဲစဉ်များကို ပိုမိုကောင်းမွန်စွာကြည့်ရှုရန် Google နှင့် Login ဝင်ပါ</p>
        </div>
        
        <button onclick="loginWithGoogle()" class="w-full flex items-center justify-center gap-3 py-4 rounded-xl bg-white text-black font-bold text-sm uppercase transition-all hover:bg-neutral-200">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24s8.955,20,20,20s20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/><path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/></svg>
            Sign in with Google
        </button>

        <button onclick="closeAuthModal()" class="w-full mt-3 py-3 rounded-xl bg-neutral-800 text-neutral-400 font-bold text-xs uppercase">Cancel</button>
    </div>
</div>

<!-- Reset Confirmation Modal -->
<div id="reset-modal" class="fixed inset-0 z-[60] flex items-center justify-center hidden p-4 modal-bg">
    <div class="bg-neutral-900 border border-neutral-800 p-8 rounded-3xl w-full max-sm shadow-2xl">
        <div class="text-center mb-6 text-white font-bold">Confirm Reset?</div>
        <div class="flex gap-2 mt-4">
            <button onclick="closeResetModal()" class="flex-1 py-3 rounded-xl bg-neutral-800 text-neutral-400 font-bold text-xs uppercase">No</button>
            <button onclick="executeReset()" class="flex-1 py-3 rounded-xl bg-red-600 text-white font-bold text-xs uppercase">Yes, Reset</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDZg4tnn8FIMZZF-dTVR8sUea7frnD7hVk",
        authDomain: "theoneproleague-3f4a8.firebaseapp.com",
        projectId: "theoneproleague-3f4a8",
        storageBucket: "theoneproleague-3f4a8.firebasestorage.app",
        messagingSenderId: "544447825938",
        appId: "1:544447825938:web:94f972149be60def1770cb",
        measurementId: "G-D1ENSM2Z14"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();
    const tournamentDocRef = doc(db, "tournaments", "efootball_main");

    // Admin List
    const ALLOWED_ADMIN_EMAILS = [
        "ziokai2212006@gmail.com"
    ];

    let currentActiveRound = 0;
    let tournamentData = {};
    let currentUser = null;
    let isAdmin = false;

    const initialPlayers = [
        "Wanna Aung", "Aung Thiha", "Ko Jake", "Pyae Sone Hein", "HOCK", "Arr Bhar", "Itoshi Sae", "Hkawng Dai", 
        "Ye Yint", "Htin Shar", "CL", "CR Korim", "YH5", "TO WARR", "NyanVision", "Aung Aung Oo", 
        "ᴇᴢʀᴀ ᴊᴀᴋᴇ", "York Loa Cc", "Thue Won Phyoe Thue", "Zennn", "MK7", "VIPER", "Leo Kham", "▄︻デK‌a‌v‌i‌n‌══━一", 
        "Ivan Maran", "Thawn Pi", "Ziggi", "Zarni YeYint", "SilentKai_10", "Bo Myint", "Wann", "Majestic"
    ];

    const roundsData = [
        { name: "Round of 32", matches: 16, type: "home-away" },
        { name: "Round of 16", matches: 8, type: "home-away" },
        { name: "Quarter Final", matches: 4, type: "home-away" },
        { name: "Semi Final", matches: 2, type: "home-away" },
        { name: "Grand Final", matches: 1, type: "single" }
    ];

    onAuthStateChanged(auth, (user) => {
        currentUser = user;
        const loginBtn = document.getElementById('login-nav-btn');
        const userInfo = document.getElementById('user-info');
        const adminToggle = document.getElementById('admin-panel-toggle');

        if (user) {
            loginBtn.classList.add('hidden');
            userInfo.classList.remove('hidden');
            document.getElementById('user-name').innerText = user.displayName;
            document.getElementById('user-photo').src = user.photoURL;
            
            // Check if Admin
            isAdmin = ALLOWED_ADMIN_EMAILS.includes(user.email);
            if (isAdmin) {
                adminToggle.classList.remove('hidden');
            } else {
                adminToggle.classList.add('hidden');
            }
        } else {
            loginBtn.classList.remove('hidden');
            userInfo.classList.add('hidden');
            adminToggle.classList.add('hidden');
            isAdmin = false;
            if (!document.getElementById('admin-view').classList.contains('hidden-view')) {
                toggleMainView('bracket');
            }
        }
        startTournamentListener();
    });

    function startTournamentListener() {
        createBracketUI();
        onSnapshot(tournamentDocRef, (docSnap) => {
            if (docSnap.exists()) {
                tournamentData = docSnap.data();
                syncDataToUI();
            } else {
                if (isAdmin) setupInitialData();
            }
            document.getElementById('loading').style.opacity = '0';
            setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
        });
    }

    async function setupInitialData() {
        const data = { rounds: [] };
        roundsData.forEach((round, rIdx) => {
            const matches = [];
            for (let i = 0; i < round.matches; i++) {
                matches.push({
                    t1name: rIdx === 0 ? (initialPlayers[i * 2] || "") : "",
                    t2name: rIdx === 0 ? (initialPlayers[i * 2 + 1] || "") : "",
                    t1s1: 0, t1s2: 0, t2s1: 0, t2s2: 0
                });
            }
            data.rounds.push({ matches });
        });
        await setDoc(tournamentDocRef, data);
    }

    function createBracketUI() {
        const wrapper = document.getElementById('rounds-wrapper');
        wrapper.innerHTML = '';
        roundsData.forEach((round, rIdx) => {
            const container = document.createElement('div');
            container.className = `round-container ${rIdx === 0 ? 'active' : ''}`;
            container.id = `round-container-${rIdx}`;
            let html = `<div class="round-title">${round.name}</div><div class="grid gap-4">`;
            for (let i = 0; i < round.matches; i++) {
                const isFinal = round.type === "single";
                html += `
                    <div class="matchup">
                        <div class="match-badge">Match ${i+1}</div>
                        <div class="space-y-3">
                            <div class="flex justify-between items-center">
                                <span class="font-bold text-sm" id="r${rIdx}m${i}t1name">Loading...</span>
                                <div class="flex gap-1">
                                    <div class="score-box" id="r${rIdx}m${i}t1s1-disp">0</div>
                                    ${!isFinal ? `<div class="score-box" id="r${rIdx}m${i}t1s2-disp">0</div>` : ''}
                                </div>
                            </div>
                            <div class="flex justify-between items-center">
                                <span class="font-bold text-sm" id="r${rIdx}m${i}t2name">Loading...</span>
                                <div class="flex gap-1">
                                    <div class="score-box" id="r${rIdx}m${i}t2s1-disp">0</div>
                                    ${!isFinal ? `<div class="score-box" id="r${rIdx}m${i}t2s2-disp">0</div>` : ''}
                                </div>
                            </div>
                        </div>
                    </div>`;
            }
            html += `</div>`;
            container.innerHTML = html;
            wrapper.appendChild(container);
        });
        updateNavButtons();
    }

    function syncDataToUI() {
        if (!tournamentData.rounds) return;
        tournamentData.rounds.forEach((round, rIdx) => {
            round.matches.forEach((match, mIdx) => {
                const isFinal = roundsData[rIdx].type === "single";
                updateElement(`r${rIdx}m${mIdx}t1name`, match.t1name || "TBA");
                updateElement(`r${rIdx}m${mIdx}t2name`, match.t2name || "TBA");
                updateElement(`r${rIdx}m${mIdx}t1s1-disp`, match.t1s1);
                updateElement(`r${rIdx}m${mIdx}t2s1-disp`, match.t2s1);
                if (!isFinal) {
                    updateElement(`r${rIdx}m${mIdx}t1s2-disp`, match.t1s2);
                    updateElement(`r${rIdx}m${mIdx}t2s2-disp`, match.t2s2);
                }
                applyColoring(rIdx, mIdx);
            });
        });
        if (!document.getElementById('admin-view').classList.contains('hidden-view')) generateAdminList();
    }

    function updateElement(id, val) {
        const el = document.getElementById(id);
        if (el) el.innerText = val;
    }

    function applyColoring(r, m) {
        const isFinal = roundsData[r].type === "single";
        const compare = (s1, s2, el1, el2) => {
            if (!el1 || !el2) return;
            el1.classList.remove('score-win', 'score-lose', 'score-draw');
            el2.classList.remove('score-win', 'score-lose', 'score-draw');
            if (s1 > s2) { el1.classList.add('score-win'); el2.classList.add('score-lose'); }
            else if (s2 > s1) { el2.classList.add('score-win'); el1.classList.add('score-lose'); }
            else if (s1 === s2 && s1 !== 0) { el1.classList.add('score-draw'); el2.classList.add('score-draw'); }
        };
        compare(parseInt(document.getElementById(`r${r}m${m}t1s1-disp`)?.innerText), parseInt(document.getElementById(`r${r}m${m}t2s1-disp`)?.innerText), document.getElementById(`r${r}m${m}t1s1-disp`), document.getElementById(`r${r}m${m}t2s1-disp`));
        if(!isFinal) compare(parseInt(document.getElementById(`r${r}m${m}t1s2-disp`)?.innerText), parseInt(document.getElementById(`r${r}m${m}t2s2-disp`)?.innerText), document.getElementById(`r${r}m${m}t1s2-disp`), document.getElementById(`r${r}m${m}t2s2-disp`));
    }

    window.openAuthModal = () => document.getElementById('auth-modal').classList.remove('hidden');
    window.closeAuthModal = () => document.getElementById('auth-modal').classList.add('hidden');

    window.loginWithGoogle = async () => {
        try {
            await signInWithPopup(auth, provider);
            closeAuthModal();
        } catch (error) {
            console.error("Login failed", error);
        }
    };

    window.handleLogout = async () => {
        await signOut(auth);
        toggleMainView('bracket');
    };

    window.toggleMainView = (view) => {
        const isBracket = view === 'bracket';
        document.getElementById('bracket-view').classList.toggle('hidden-view', !isBracket);
        document.getElementById('admin-view').classList.toggle('hidden-view', isBracket);
        document.getElementById('bracket-btn').className = isBracket ? "px-6 py-2 rounded-lg bg-red-600 text-white font-bold text-[10px] uppercase tracking-widest transition-all" : "px-6 py-2 rounded-lg bg-neutral-900 text-neutral-500 font-bold text-[10px] uppercase tracking-widest transition-all";
        
        const adminToggle = document.getElementById('admin-panel-toggle');
        if (adminToggle) {
            adminToggle.className = !isBracket ? "px-6 py-2 rounded-lg bg-red-600 text-white font-bold text-[10px] uppercase tracking-widest transition-all" : "px-6 py-2 rounded-lg bg-neutral-900 text-neutral-500 font-bold text-[10px] uppercase tracking-widest transition-all";
        }

        if(!isBracket) generateAdminList();
    };

    window.confirmReset = () => document.getElementById('reset-modal').classList.remove('hidden');
    window.closeResetModal = () => document.getElementById('reset-modal').classList.add('hidden');
    window.executeReset = async () => {
        if (!isAdmin) return;
        await setupInitialData();
        closeResetModal();
    };

    window.changeRound = (dir) => {
        document.getElementById(`round-container-${currentActiveRound}`).classList.remove('active');
        currentActiveRound += dir;
        document.getElementById(`round-container-${currentActiveRound}`).classList.add('active');
        updateNavButtons();
        if (!document.getElementById('admin-view').classList.contains('hidden-view')) generateAdminList();
    };

    function updateNavButtons() {
        document.getElementById('prev-round').disabled = currentActiveRound === 0;
        document.getElementById('next-round').disabled = currentActiveRound === roundsData.length - 1;
        document.getElementById('round-indicator').innerText = `အဆင့် ${currentActiveRound + 1} / ${roundsData.length}`;
    }

    function generateAdminList() {
        if (!isAdmin) return;
        const list = document.getElementById('admin-match-list');
        list.innerHTML = `<div class="text-red-500 font-bold text-[10px] mb-4 uppercase">Editing: ${roundsData[currentActiveRound].name}</div>`;
        tournamentData.rounds[currentActiveRound].matches.forEach((match, mIdx) => {
            const isFinal = roundsData[currentActiveRound].type === "single";
            const div = document.createElement('div');
            div.className = "p-4 bg-black/20 border border-neutral-800 rounded-xl flex items-center justify-between";
            div.innerHTML = `
                <div class="text-xs font-bold w-1/3">${match.t1name || 'T1'} vs ${match.t2name || 'T2'}</div>
                <div class="flex gap-2">
                    <input type="number" class="admin-score-input" value="${match.t1s1}" onchange="updateFirebaseScore(${currentActiveRound}, ${mIdx}, 't1s1', this.value)">
                    ${!isFinal ? `<input type="number" class="admin-score-input" value="${match.t1s2}" onchange="updateFirebaseScore(${currentActiveRound}, ${mIdx}, 't1s2', this.value)">` : ''}
                    <span class="text-neutral-600">|</span>
                    <input type="number" class="admin-score-input" value="${match.t2s1}" onchange="updateFirebaseScore(${currentActiveRound}, ${mIdx}, 't2s1', this.value)">
                    ${!isFinal ? `<input type="number" class="admin-score-input" value="${match.t2s2}" onchange="updateFirebaseScore(${currentActiveRound}, ${mIdx}, 't2s2', this.value)">` : ''}
                </div>`;
            list.appendChild(div);
        });
    }

    window.updateFirebaseScore = async (r, m, field, val) => {
        if (!isAdmin) return;
        tournamentData.rounds[r].matches[m][field] = parseInt(val) || 0;
        
        // Auto-advance logic
        if (r < roundsData.length - 1) {
            const match = tournamentData.rounds[r].matches[m];
            const t1total = match.t1s1 + (match.t1s2 || 0);
            const t2total = match.t2s1 + (match.t2s2 || 0);
            
            if (t1total !== t2total) {
                let winner = t1total > t2total ? match.t1name : match.t2name;
                const nextMatchIdx = Math.floor(m / 2);
                const nextTeamSlot = (m % 2 === 0) ? 't1name' : 't2name';
                tournamentData.rounds[r + 1].matches[nextMatchIdx][nextTeamSlot] = winner;
            }
        }
        await setDoc(tournamentDocRef, tournamentData);
    }
</script>
