<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ONE COMMUNITY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        :root {
            --primary-red: #ef4444;
            --primary-green: #22c55e;
            --primary-yellow: #eab308;
            --dark-bg: #0a0a0a;
            --card-bg: #111111;
            --border-color: #262626;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--dark-bg);
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(239, 68, 68, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(239, 68, 68, 0.08) 0%, transparent 40%);
            color: #ffffff;
            margin: 0;
            overflow-x: hidden;
        }

        .round-container {
            display: none; 
            animation: fadeIn 0.5s ease-out;
        }

        .round-container.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .round-title {
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: var(--primary-red);
            font-weight: 800;
            font-size: 1.5rem;
            margin-bottom: 2rem;
            padding: 1rem 0;
            border-bottom: 2px solid var(--primary-red);
            text-shadow: 0 0 15px rgba(239, 68, 68, 0.3);
        }

        .matchup {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 1.25rem;
            padding: 1.5rem;
            margin: 1rem 0;
            transition: all 0.3s ease;
            position: relative;
        }

        .match-badge {
            position: absolute;
            top: -10px;
            left: 20px;
            background: var(--primary-red);
            color: white;
            font-size: 0.65rem;
            font-weight: 900;
            padding: 2px 10px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .score-box {
            min-width: 32px;
            height: 32px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.9rem;
            color: #888;
        }

        .score-win { color: var(--primary-green) !important; border-color: rgba(34, 197, 94, 0.3) !important; }
        .score-lose { color: var(--primary-red) !important; border-color: rgba(239, 68, 68, 0.3) !important; }
        .score-draw { color: var(--primary-yellow) !important; border-color: rgba(234, 179, 8, 0.3) !important; }

        .nav-btn {
            padding: 0.75rem 2rem;
            border-radius: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        .hidden-view { display: none !important; }
        
        .admin-score-input {
            width: 50px;
            height: 40px;
            background: #000;
            border: 1px solid #444;
            color: white;
            text-align: center;
            border-radius: 8px;
            font-weight: 800;
        }

        .input-win { border-color: var(--primary-green) !important; color: var(--primary-green) !important; }
        .input-lose { border-color: var(--primary-red) !important; color: var(--primary-red) !important; }
        .input-draw { border-color: var(--primary-yellow) !important; color: var(--primary-yellow) !important; }

        #auth-modal {
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
        }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: var(--dark-bg);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay">
    <div class="w-12 h-12 border-4 border-red-600 border-t-transparent rounded-full animate-spin mb-4"></div>
    <div class="text-[10px] font-bold text-neutral-500 uppercase tracking-widest">Connecting to database...</div>
</div>

<header class="pt-12 pb-6 text-center px-4">
    <h1 class="text-4xl font-extrabold mb-2 tracking-tighter text-white uppercase italic">THE ONE PRO LEAGUE</h1>
    <div class="flex justify-center gap-3 mt-6">
        <button onclick="toggleMainView('bracket')" id="bracket-btn" class="px-6 py-2 rounded-lg bg-red-600 text-white font-bold text-[10px] uppercase tracking-widest transition-all">Bracket View</button>
        <button onclick="checkAdminAuth()" id="admin-btn" class="px-6 py-2 rounded-lg bg-neutral-900 text-neutral-500 font-bold text-[10px] uppercase tracking-widest transition-all">Admin Panel</button>
    </div>
</header>

<main id="bracket-view" class="max-w-xl mx-auto px-4 pb-24">
    <div id="rounds-wrapper"></div>
    
    <div class="flex justify-between items-center mt-8 pt-6 border-t border-neutral-800">
        <button id="prev-round" onclick="changeRound(-1)" class="nav-btn bg-neutral-800 text-neutral-400">ရှေ့သို့</button>
        <div id="round-indicator" class="text-[10px] font-black text-neutral-500 uppercase tracking-[0.3em]">အဆင့် ၁ / ၅</div>
        <button id="next-round" onclick="changeRound(1)" class="nav-btn bg-red-600 text-white shadow-lg shadow-red-900/20">နောက်တစ်ဆင့်</button>
    </div>
</main>

<div id="admin-view" class="hidden-view px-4 pb-24 max-w-2xl mx-auto">
    <div class="bg-[#111] border border-neutral-800 rounded-3xl p-6">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-black text-white uppercase italic">ရမှတ်များ စာရင်းသွင်းရန်</h2>
            <button onclick="logoutAdmin()" class="text-[9px] font-bold text-neutral-600 hover:text-red-500 uppercase tracking-widest">Logout</button>
        </div>
        <div id="admin-match-list" class="space-y-4"></div>
    </div>
</div>

<div id="auth-modal" class="fixed inset-0 z-50 flex items-center justify-center hidden p-4">
    <div class="bg-neutral-900 border border-neutral-800 p-8 rounded-3xl w-full max-w-sm shadow-2xl">
        <div class="text-center mb-6">
            <div class="inline-block p-3 rounded-full bg-red-600/10 mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-red-600"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
            <h3 class="text-lg font-bold text-white">Admin Access</h3>
            <p class="text-neutral-500 text-xs mt-1">ရှေ့ဆက်ရန် Password ရိုက်ထည့်ပါ</p>
        </div>
        <input type="password" id="admin-pw" placeholder="••••" class="w-full bg-black border border-neutral-800 rounded-xl p-4 text-center text-2xl font-bold text-red-500 tracking-[0.5em] focus:border-red-600 focus:outline-none mb-4">
        <div class="flex gap-2">
            <button onclick="closeAuthModal()" class="flex-1 py-3 rounded-xl bg-neutral-800 text-neutral-400 font-bold text-xs uppercase">Cancel</button>
            <button onclick="verifyPassword()" class="flex-1 py-3 rounded-xl bg-red-600 text-white font-bold text-xs uppercase shadow-lg shadow-red-900/20">Login</button>
        </div>
        <p id="auth-error" class="text-red-500 text-[10px] font-bold text-center mt-4 hidden">Password မှားယွင်းနေပါသည်။ ပြန်ကြိုးစားပါ။</p>
    </div>
</div>

<!-- Firebase SDK -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAO0oWLqJ_YoQgEeBkQakEXcw8-VF7wY7I",
        authDomain: "proleagues2.firebaseapp.com",
        projectId: "proleagues2",
        storageBucket: "proleagues2.firebasestorage.app",
        messagingSenderId: "178428206580",
        appId: "1:178428206580:web:ff78031a09446951a96da1",
        measurementId: "G-9Y219BTFW9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const tournamentDocRef = doc(db, "tournaments", "efootball_main");

    // Config & State
    const ADMIN_PASSWORD = "1234";
    let isAdminAuthenticated = false;
    let currentActiveRound = 0;
    let tournamentData = {};

    const initialPlayers = [
        "Wanna Aung", "Aung Thiha", "Ko Jake", "Pyae Sone Hein", "HOCK", "Arr Bhar", "Itoshi Sae", "Hkawng Dai", 
        "Ye Yint", "Htin Shar", "CL", "CR Korim", "YH5", "TO WARR", "NyanVision", "Aung Aung Oo", 
        "ᴇᴢʀᴀ ᴊᴀᴋᴇ", "York Loa Cc", "Thue Won Phyoe Thue", "Zennn", "MK7", "VIPER", "Leo Kham", "▄︻デK‌a‌v‌i‌n‌══━一", 
        "Ivan Maran", "Thawn Pi", "Ziggi", "Zarni YeYint", "SilentKai_10", "Bo Myint", "Wann", "Majestic"
    ];

    const roundsData = [
        { name: "Round of 32", matches: 16, type: "home-away" },
        { name: "Round of 16", matches: 8, type: "home-away" },
        { name: "Quarter Final", matches: 4, type: "home-away" },
        { name: "Semi Final", matches: 2, type: "home-away" },
        { name: "Grand Final", matches: 1, type: "single" }
    ];

    // Initialize UI
    function initApp() {
        createBracketUI();
        
        // Subscribe to real-time updates from Firebase
        onSnapshot(tournamentDocRef, (docSnap) => {
            if (docSnap.exists()) {
                tournamentData = docSnap.data();
                syncDataToUI();
            } else {
                // Initialize first-time setup
                setupInitialData();
            }
            document.getElementById('loading').style.opacity = '0';
            setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
        });
    }

    async function setupInitialData() {
        const data = { rounds: [] };
        roundsData.forEach((round, rIdx) => {
            const matches = [];
            for (let i = 0; i < round.matches; i++) {
                matches.push({
                    t1name: rIdx === 0 ? (initialPlayers[i * 2] || "") : "",
                    t2name: rIdx === 0 ? (initialPlayers[i * 2 + 1] || "") : "",
                    t1s1: 0, t1s2: 0, t2s1: 0, t2s2: 0
                });
            }
            data.rounds.push({ matches });
        });
        await setDoc(tournamentDocRef, data);
    }

    function syncDataToUI() {
        tournamentData.rounds.forEach((round, rIdx) => {
            round.matches.forEach((match, mIdx) => {
                const isFinal = roundsData[rIdx].type === "single";
                
                // Update Bracket View
                updateElement(`r${rIdx}m${mIdx}t1name`, match.t1name, 'val');
                updateElement(`r${rIdx}m${mIdx}t2name`, match.t2name, 'val');
                updateElement(`r${rIdx}m${mIdx}t1s1-disp`, match.t1s1);
                updateElement(`r${rIdx}m${mIdx}t2s1-disp`, match.t2s1);
                
                if (!isFinal) {
                    updateElement(`r${rIdx}m${mIdx}t1s2-disp`, match.t1s2);
                    updateElement(`r${rIdx}m${mIdx}t2s2-disp`, match.t2s2);
                }

                // Apply Colors
                applyColoring(rIdx, mIdx);
            });
        });
        
        // If admin view is open, refresh the list
        if (!document.getElementById('admin-view').classList.contains('hidden-view')) {
            generateAdminList();
        }
    }

    function updateElement(id, val, type = 'text') {
        const el = document.getElementById(id);
        if (!el) return;
        if (type === 'val') el.value = val;
        else el.innerText = val;
    }

    // Global Exposure for HTML onclicks
    window.toggleMainView = (view) => {
        const bracketBtn = document.getElementById('bracket-btn');
        const adminBtn = document.getElementById('admin-btn');
        
        if(view === 'bracket') {
            document.getElementById('bracket-view').classList.remove('hidden-view');
            document.getElementById('admin-view').classList.add('hidden-view');
            bracketBtn.classList.replace('bg-neutral-900', 'bg-red-600');
            bracketBtn.classList.replace('text-neutral-500', 'text-white');
            adminBtn.classList.replace('bg-red-600', 'bg-neutral-900');
            adminBtn.classList.replace('text-white', 'text-neutral-500');
        } else {
            document.getElementById('bracket-view').classList.add('hidden-view');
            document.getElementById('admin-view').classList.remove('hidden-view');
            adminBtn.classList.replace('bg-neutral-900', 'bg-red-600');
            adminBtn.classList.replace('text-neutral-500', 'text-white');
            bracketBtn.classList.replace('bg-red-600', 'bg-neutral-900');
            bracketBtn.classList.replace('text-white', 'text-neutral-500');
            generateAdminList();
        }
    };

    window.checkAdminAuth = () => {
        if (isAdminAuthenticated) toggleMainView('admin');
        else {
            document.getElementById('auth-modal').classList.remove('hidden');
            document.getElementById('admin-pw').focus();
        }
    };

    window.closeAuthModal = () => {
        document.getElementById('auth-modal').classList.add('hidden');
        document.getElementById('admin-pw').value = '';
        document.getElementById('auth-error').classList.add('hidden');
    };

    window.verifyPassword = () => {
        if (document.getElementById('admin-pw').value === ADMIN_PASSWORD) {
            isAdminAuthenticated = true;
            closeAuthModal();
            toggleMainView('admin');
        } else {
            document.getElementById('auth-error').classList.remove('hidden');
        }
    };

    window.logoutAdmin = () => {
        isAdminAuthenticated = false;
        toggleMainView('bracket');
    };

    window.changeRound = (dir) => {
        const newRound = currentActiveRound + dir;
        if(newRound >= 0 && newRound < roundsData.length) {
            document.getElementById(`round-container-${currentActiveRound}`).classList.remove('active');
            currentActiveRound = newRound;
            document.getElementById(`round-container-${currentActiveRound}`).classList.add('active');
            updateNavButtons();
            window.scrollTo(0,0);
        }
    };

    function createBracketUI() {
        const wrapper = document.getElementById('rounds-wrapper');
        wrapper.innerHTML = '';
        roundsData.forEach((round, rIdx) => {
            const container = document.createElement('div');
            container.className = `round-container ${rIdx === 0 ? 'active' : ''}`;
            container.id = `round-container-${rIdx}`;
            let html = `<div class="round-title">${round.name}</div><div class="grid gap-4">`;
            for (let i = 0; i < round.matches; i++) {
                const isFinal = round.type === "single";
                html += `
                    <div class="matchup">
                        <div class="match-badge">Match ${i+1}</div>
                        <div class="space-y-3">
                            <div class="flex justify-between items-center">
                                <input type="text" readonly class="bg-transparent border-b border-neutral-800 font-bold text-sm outline-none w-1/2" id="r${rIdx}m${i}t1name">
                                <div class="flex gap-1">
                                    <div class="score-box" id="r${rIdx}m${i}t1s1-disp">0</div>
                                    ${!isFinal ? `<div class="score-box" id="r${rIdx}m${i}t1s2-disp">0</div>` : ''}
                                </div>
                            </div>
                            <div class="flex justify-between items-center">
                                <input type="text" readonly class="bg-transparent border-b border-neutral-800 font-bold text-sm outline-none w-1/2" id="r${rIdx}m${i}t2name">
                                <div class="flex gap-1">
                                    <div class="score-box" id="r${rIdx}m${i}t2s1-disp">0</div>
                                    ${!isFinal ? `<div class="score-box" id="r${rIdx}m${i}t2s2-disp">0</div>` : ''}
                                </div>
                            </div>
                        </div>
                    </div>`;
            }
            html += `</div>`;
            container.innerHTML = html;
            wrapper.appendChild(container);
        });
        updateNavButtons();
    }

    function generateAdminList() {
        const list = document.getElementById('admin-match-list');
        if (!tournamentData.rounds) return;
        
        list.innerHTML = `<div class="text-red-500 font-bold text-[10px] mb-4 uppercase tracking-tighter">ပြင်ဆင်နေသည့်အဆင့်: ${roundsData[currentActiveRound].name}</div>`;
        const round = tournamentData.rounds[currentActiveRound];
        const rIdx = currentActiveRound;

        round.matches.forEach((match, mIdx) => {
            const isFinal = roundsData[rIdx].type === "single";
            const div = document.createElement('div');
            div.className = "p-4 bg-black/20 border border-neutral-800 rounded-xl flex items-center justify-between";
            div.innerHTML = `
                <div class="text-xs font-bold w-1/3">${match.t1name || 'T1'} vs ${match.t2name || 'T2'}</div>
                <div class="flex gap-4">
                    <div class="flex flex-col gap-1 items-center">
                        <div class="flex gap-1">
                            <input type="number" class="admin-score-input" value="${match.t1s1}" onchange="updateFirebaseScore(${rIdx}, ${mIdx}, 't1s1', this.value)">
                            ${!isFinal ? `<input type="number" class="admin-score-input" value="${match.t1s2}" onchange="updateFirebaseScore(${rIdx}, ${mIdx}, 't1s2', this.value)">` : ''}
                        </div>
                    </div>
                    <div class="flex flex-col gap-1 items-center">
                        <div class="flex gap-1">
                            <input type="number" class="admin-score-input" value="${match.t2s1}" onchange="updateFirebaseScore(${rIdx}, ${mIdx}, 't2s1', this.value)">
                            ${!isFinal ? `<input type="number" class="admin-score-input" value="${match.t2s2}" onchange="updateFirebaseScore(${rIdx}, ${mIdx}, 't2s2', this.value)">` : ''}
                        </div>
                    </div>
                </div>`;
            list.appendChild(div);
        });
    }

    window.updateFirebaseScore = async (r, m, field, val) => {
        tournamentData.rounds[r].matches[m][field] = parseInt(val) || 0;
        
        // Auto-progression logic
        if (r < roundsData.length - 1) {
            const match = tournamentData.rounds[r].matches[m];
            const t1total = match.t1s1 + (match.t1s2 || 0);
            const t2total = match.t2s1 + (match.t2s2 || 0);
            const winner = t1total > t2total ? match.t1name : (t2total > t1total ? match.t2name : "");
            
            if (winner) {
                const nextRound = r + 1;
                const nextMatch = Math.floor(m / 2);
                const teamSlot = (m % 2 === 0) ? 't1name' : 't2name';
                tournamentData.rounds[nextRound].matches[nextMatch][teamSlot] = winner;
            }
        }

        await setDoc(tournamentDocRef, tournamentData);
    };

    function applyColoring(r, m) {
        const isFinal = roundsData[r].type === "single";
        const compare = (s1, s2, el1, el2) => {
            el1?.classList.remove('score-win', 'score-lose', 'score-draw');
            el2?.classList.remove('score-win', 'score-lose', 'score-draw');
            if (s1 > s2) { el1.classList.add('score-win'); el2.classList.add('score-lose'); }
            else if (s2 > s1) { el2.classList.add('score-win'); el1.classList.add('score-lose'); }
            else { el1.classList.add('score-draw'); el2.classList.add('score-draw'); }
        };

        const t1s1 = parseInt(document.getElementById(`r${r}m${m}t1s1-disp`)?.innerText || 0);
        const t2s1 = parseInt(document.getElementById(`r${r}m${m}t2s1-disp`)?.innerText || 0);
        compare(t1s1, t2s1, document.getElementById(`r${r}m${m}t1s1-disp`), document.getElementById(`r${r}m${m}t2s1-disp`));

        if(!isFinal) {
            const t1s2 = parseInt(document.getElementById(`r${r}m${m}t1s2-disp`)?.innerText || 0);
            const t2s2 = parseInt(document.getElementById(`r${r}m${m}t2s2-disp`)?.innerText || 0);
            compare(t1s2, t2s2, document.getElementById(`r${r}m${m}t1s2-disp`), document.getElementById(`r${r}m${m}t2s2-disp`));
        }
    }

    function updateNavButtons() {
        document.getElementById('prev-round').disabled = currentActiveRound === 0;
        document.getElementById('next-round').disabled = currentActiveRound === roundsData.length - 1;
        document.getElementById('round-indicator').innerText = `အဆင့် ${currentActiveRound + 1} / ${roundsData.length}`;
    }

    // Start App
    initApp();
</script>

</body>
</html>
